<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ludo Rex — Play Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS variables — must stay vanilla, Tailwind CDN has no config to define these */
        :root {
            --cream: #FBF7EE;
            --paper: #fff;
            --ink: #2B2620;
            --ink-soft: #6b6459;
            --board-line: #d8cfc0;
            --yellow: #ffd76a;
            --yellow-dark: #e0a91f;
            --green-dark: #1f7a4d;
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.18);
        }

        /* Reused surface classes (background var + shadow var repeated 3x — cleaner as a class) */
        .board-shell {
            box-shadow: var(--shadow-lg);
            margin-top: 90px;
        }

        .panel-card {
            background: var(--cream);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .winner-card {
            background: var(--cream);
            border-radius: 26px;
            padding: 40px 46px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            max-width: 380px;
        }

        .start-btn {
            background: linear-gradient(180deg, var(--yellow) 0%, var(--yellow-dark) 100%);
            color: #3a2600;
            border: none;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 15px;
            padding: 11px 28px;
            border-radius: 13px;
            box-shadow: 0 5px 0 #9c6c10, var(--shadow-sm);
            transition: transform .1s ease, box-shadow .1s ease;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9c6c10;
        }

        /* 15x15 board grid — dense/specific, not worth converting */
        .board {
            width: min(100%, 88vw);
            height: min(568px, 88vw);
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            background: var(--paper);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 0 2px var(--board-line);
            border-radius: 25px;
        }

        .cell {
            position: relative;
            border: 0.5px solid var(--board-line);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell.path {
            background: var(--paper);
        }

        /* pseudo-element — impossible in Tailwind without a plugin */
        .cell.safe::before {
            content: '★';
            position: absolute;
            font-size: 160%;
            color: rgba(43, 38, 32, 0.38);
        }

        /* multi-property transitions with different durations/easings per property */
        .token {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.35), inset 0 2px 2px rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.85);
            cursor: pointer;
            transition: left .28s cubic-bezier(.4, 1.4, .6, 1), top .28s cubic-bezier(.4, 1.4, .6, 1), transform .15s ease;
            z-index: 5;
        }

        .token.movable {
            animation: tokenPulse 1s ease-in-out infinite;
            cursor: pointer;
        }

        .token.movable:hover {
            transform: scale(1.15);
        }

        .dice3d.can-roll {
            animation: diceIdle 1.8s ease-in-out infinite;
        }

        .dice3d.rolling {
            animation: diceRoll 0.55s ease-in-out;
        }

        .dice-wrap {
            perspective: 500px;
        }

        .dice-cube {
            position: relative;
            width: 50px;
            height: 50px;
            transform-style: preserve-3d;
        }

        .dice-face {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ffffff, #e8e0cc);
            border-radius: 10px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 0 0 1px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dice-face.front {
            transform: translateZ(30px);
        }

        .dice-face.back {
            transform: rotateY(180deg) translateZ(30px);
        }

        .dice-face.right {
            transform: rotateY(90deg) translateZ(30px);
        }

        .dice-face.left {
            transform: rotateY(-90deg) translateZ(30px);
        }

        .dice-face.top {
            transform: rotateX(90deg) translateZ(30px);
        }

        .dice-face.bottom {
            transform: rotateX(-90deg) translateZ(30px);
        }

        /* all keyframes */
        @keyframes tokenPulse {

            0%,
            100% {
                box-shadow: 0 2px 3px rgba(0, 0, 0, 0.35), inset 0 2px 2px rgba(255, 255, 255, 0.5), 0 0 0 0 rgba(255, 255, 255, 0.6);
            }

            50% {
                box-shadow: 0 2px 3px rgba(0, 0, 0, 0.35), inset 0 2px 2px rgba(255, 255, 255, 0.5), 0 0 0 6px rgba(255, 255, 255, 0);
            }
        }

        @keyframes diceIdle {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-4px) rotate(-4deg);
            }
        }


        /* custom breakpoints — Tailwind CDN has no config to redefine these, so keep vanilla */
        @media (max-width: 880px) {
            .game-wrap-legacy-note {
                /* if you kept any wrapper class, adjust flex-direction here */
            }
        }

        @media (max-width: 480px) {
            /* your existing 480px rules for .brand h1, .mode-grid, .menu-card, .panel */
        }

        .app {
            background-image: url("https://ludoking.com/play/lk_h5_bg.jpg");
            background-position: center;
            background-size: contain;
            text-align: center;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            filter: brightness(1);
        }

        .home::before,
        .game::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://ludoking.com/play/lk_h5_bg.jpg");
            background-position: center;
            background-size: auto;
            filter: brightness(1.5);
            z-index: 0;
        }

        .home,
        .game {
            position: relative;
            width: 576px;
            height: 100vh;
            overflow: hidden;
        }

        .home>*,
        .game>* {
            position: relative;
            z-index: 1;
        }

        @media (max-width: 576px) {

            .home,
            .game {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const START_OFFSET = { red: 39, green: 0, yellow: 13, blue: 26 }; // Starting positions for each color on the board

        const SAFE_GLOBAL = [0, 8, 13, 21, 26, 34, 39, 47]; // Safe positions on the global track where tokens cannot be captured

        const ENTRY_ARROWS = {
            red: [13, 6],
            green: [6, 1],
            yellow: [1, 8],
            blue: [8, 13]
        };

        const background = {
            green: "#138808",
            yellow: "#FFD400",
            red: "#E53935",
            blue: "#1E88E5"
        };

        const SOUNDS = {
            dice: new Audio("https://cdn.freesound.org/previews/736/736744_15933495-lq.mp3"),
            move: new Audio("https://cdn.freesound.org/previews/464/464909_4284968-lq.mp3"),
            capture: new Audio("https://cdn.freesound.org/previews/855/855914_15895934-lq.mp3"),
            pass: new Audio("https://cdn.freesound.org/previews/844/844146_10594370-lq.mp3"),
            win: new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3")
        };

        let soundEnabled = true;
        function setSoundEnabled(value) {
            soundEnabled = value;
        }

        function playSound(name) {
            if (!soundEnabled) return;
            const sound = SOUNDS[name];
            if (!sound) return;
            sound.currentTime = 0;
            sound.play().catch(() => { });
        }

        // Mapping of each color to its respective coordinates in the home yard, where tokens start the game
        const YARD_COORDS = {
            green: [[1.5, 1.5], [1.5, 3.5], [3.5, 1.5], [3.5, 3.5]],
            yellow: [[1.5, 10.5], [1.5, 12.5], [3.5, 10.5], [3.5, 12.5]],
            red: [[10.5, 1.5], [10.5, 3.5], [12.5, 1.5], [12.5, 3.5]],
            blue: [[10.5, 10.5], [10.5, 12.5], [12.5, 10.5], [12.5, 12.5]],
        };

        // Function to build the coordinates for the Ludo board track, mapping each position to its corresponding row and column on the board
        function buildTrackCoords() {
            const coords = new Array(52);
            // We'll hand-place using classic Ludo King coordinate table.
            const path = [
                [6, 1], [6, 2], [6, 3], [6, 4], [6, 5],
                [5, 6], [4, 6], [3, 6], [2, 6], [1, 6], [0, 6],
                [0, 7],
                [0, 8],
                [1, 8], [2, 8], [3, 8], [4, 8], [5, 8],
                [6, 9], [6, 10], [6, 11], [6, 12], [6, 13], [6, 14],
                [7, 14],
                [8, 14],
                [8, 13], [8, 12], [8, 11], [8, 10], [8, 9],
                [9, 8], [10, 8], [11, 8], [12, 8], [13, 8], [14, 8],
                [14, 7],
                [14, 6],
                [13, 6], [12, 6], [11, 6], [10, 6], [9, 6],
                [8, 5], [8, 4], [8, 3], [8, 2], [8, 1], [8, 0],
                [7, 0],
                [6, 0]
            ];
            for (let i = 0; i < 52; i++) coords[i] = path[i];
            return coords;
        }
        const TRACK_COORDS = buildTrackCoords();

        // Mapping of colors to their respective hex color codes for styling
        const COLOR_HEX = {
            red: { main: "#df2d2d", dark: "#C92E28", soft: "#FFD9D3" },
            green: { main: "#0b8b22", dark: "#149350", soft: "#D3F5E0" },
            yellow: { main: "#ffd400", dark: "#E09400", soft: "#FFEBBE" },
            blue: { main: "#1d88e5", dark: "#1573C4", soft: "#D3E9FE" },
        };

        // Component to render a colored pin(token) representing a player's token
        function ColorGlyph({ color, size = 30 }) {
            const hex = COLOR_HEX[color].main;
            return (
                <svg viewBox="0 0 100 100" width={size} height={size}>
                    <path
                        d="M50 8 C27 8 10 26 10 48 C10 68 35 85 50 96 C65 85 90 68 90 48 C90 26 73 8 50 8 Z"
                        fill={hex}
                        stroke="white"
                        strokeWidth="6"
                        strokeLinejoin="round"
                    />
                    <circle cx="50" cy="45" r="16" fill="white" opacity="0.9" />
                </svg>
            );
        }

        // List of available game modes
        const MODES = [
            { id: "2p", label: "2 Players", players: 2, sub: "Classic duel", dots: 2 },
            { id: "3p", label: "3 Players", players: 3, sub: "Triple threat", dots: 3 },
            { id: "4p", label: "4 Players", players: 4, sub: "Full house", dots: 4 },
            { id: "bot", label: "Vs Bot", players: 2, sub: "You + 1 bot", dots: 2, isBot: true },
        ];

        function CenterTriangle() {
            const hex = c => COLOR_HEX[c].main;
            return (
                <div style={{ gridRow: "7 / span 3", gridColumn: "7 / span 3", position: "relative", pointerEvents: "none" }}>
                    <svg viewBox="0 0 100 100" width="100%" height="100%" style={{ overflow: "visible" }}>
                        <g transform="translate(50,50) translate(-50,-50)">
                            <polygon points="0,0 50,50 0,100" fill={hex("green")} />
                            <polygon points="0,0 100,0 50,50" fill={hex("yellow")} />
                            <polygon points="100,0 100,100 50,50" fill={hex("blue")} />
                            <polygon points="0,100 100,100 50,50" fill={hex("red")} />
                        </g>
                    </svg>
                </div>
            );
        }

        function HomeYard({ color }) {
            const positions = { green: [0, 0], yellow: [0, 9], red: [9, 0], blue: [9, 9] };
            const [r0, c0] = positions[color];
            const hex = COLOR_HEX[color];
            return (
                <div style={{
                    gridRow: (r0 + 1) + " / span 6",
                    gridColumn: (c0 + 1) + " / span 6",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    position: "relative",
                }}>
                    <div style={{
                        width: "66%", height: "66%",
                        background: "white",
                        borderRadius: "14%",
                        display: "grid",
                        gridTemplateColumns: "1fr 1fr",
                        gridTemplateRows: "1fr 1fr",
                        gap: "12%",
                        padding: "12%",
                        boxShadow: "0 4px 10px rgba(0,0,0,0.18)",
                    }}>
                        {[0, 1, 2, 3].map(i => (
                            <div key={i} style={{
                                background: hex.soft,
                                borderRadius: "50%",
                                border: `3px solid ${hex.main}`,
                            }} />
                        ))}
                    </div>
                </div>
            );
        }

        // Function to calculate the row and column coordinates of a token based on its color, position on the track, and index within its home yard or home column
        function tokenCoord(color, pos, tokenIdx) {
            if (pos === -1) {
                const [r, c] = YARD_COORDS[color][tokenIdx];
                return { row: r, col: c };
            }
            if (pos === 56) {
                const [r, c] = CENTER_CELLS[color]
                return { row: r, col: c };
            }
            if (pos >= 51) { // home column, pos 51..55 -> index 0..5 ; pos 56 = finished(center)
                const hc = HOME_COLS[color];
                const idx = pos - 51;
                const [r, c] = hc[idx];
                return { row: r, col: c };
            }
            const globalIdx = (START_OFFSET[color] + pos) % 52;
            const [r, c] = TRACK_COORDS[globalIdx];
            return { row: r, col: c };
        }

        // Component to render a player's token on the board, positioned based on its color, index, and position in the game. It also handles click events for movable tokens.
        function Token({ color, tokenIdx, pos, stackCount = 1, stackOffset = 0, movable, onClick }) {
            const { row, col } = tokenCoord(color, pos, tokenIdx);
            const STACK_OFFSETS = {
                1: [
                    { x: 0, y: 0 }
                ],
                2: [
                    { x: -5, y: 0 },
                    { x: 5, y: 0 }
                ],
                3: [
                    { x: -5, y: -4 },
                    { x: 5, y: -4 },
                    { x: 0, y: 5 }
                ],
                4: [
                    { x: -5, y: -5 },
                    { x: 5, y: -5 },
                    { x: -5, y: 5 },
                    { x: 5, y: 5 }
                ]
            };

            const offset = STACK_OFFSETS[Math.min(stackCount, 4)][stackOffset];
            const dx = offset.x;
            const dy = offset.y;
            let tokenSize = 6.4;
            switch (stackCount) {
                case 2:
                    tokenSize = 4.8;
                    break;
                case 3:
                    tokenSize = 4.4;
                    break;
                case 4:
                    tokenSize = 4.0;
                    break;
                default:
                    tokenSize = 6.4;
            }
            const halfToken = tokenSize / 2;
            const cellSize = 100 / 15;
            const jitter = stackCount > 1 ? (stackOffset * 6 - (stackCount - 1) * 3) : 0;
            const style = {
                position: "absolute",
                left: `calc(${col * cellSize}% + ${cellSize * 0.5}% - ${halfToken}% + ${jitter}% + ${dx}px)`,
                top: `calc(${row * cellSize}% + ${cellSize * 0.5}% - ${halfToken}% + ${dy}px)`,
                width: `${tokenSize}%`,
                height: `${tokenSize}%`,
                background: COLOR_HEX[color].main,
            };
            return (
                <div
                    className={"token" + (movable ? " movable" : "")}
                    style={style}
                    onClick={movable ? onClick : undefined}
                >
                    <div className="token-dot" />
                    {stackCount > 1 && stackOffset === 0 && <div className="token-stack-count">{stackCount}</div>}
                </div>
            );
        }

        // Component to render a star icon, used to indicate safe squares on the board
        function StarIcon() {
            return (
                <svg viewBox="0 0 24 24" width="62%" height="62%" style={{ opacity: 0.85 }}>
                    <polygon
                        points="12,1.5 15.1,8.6 22.8,9.3 17,14.5 18.7,22.2 12,18.2 5.3,22.2 7,14.5 1.2,9.3 8.9,8.6"
                        fill="rgba(255,255,255,0.55)"
                        stroke="rgba(255,255,255,0.95)"
                        strokeWidth="1.1"
                    />
                </svg>
            );
        }

        const PIP_LAYOUTS = {
            1: [[50, 50]],
            2: [[25, 25], [75, 75]],
            3: [[25, 25], [50, 50], [75, 75]],
            4: [[25, 25], [75, 25], [25, 75], [75, 75]],
            5: [[25, 25], [75, 25], [50, 50], [25, 75], [75, 75]],
            6: [[25, 25], [75, 25], [25, 50], [75, 50], [25, 75], [75, 75]],
        };

        function DiceFace({ value }) {
            return (
                <svg viewBox="0 0 100 100" width="50" height="50">
                    {PIP_LAYOUTS[value].map(([cx, cy], i) => (
                        <circle key={i} cx={cx} cy={cy} r="9" fill="#2B2620" />
                    ))}
                </svg>
            );
        }

        // Verified via rotation-matrix math: to bring a face to the viewer, rotate the cube
        // by the inverse of that face's own placement rotation.
        const FACE_ROTATION = {
            1: { x: 0, y: 0 },
            6: { x: 0, y: -180 },
            2: { x: 0, y: -90 },
            5: { x: 0, y: 90 },
            3: { x: -90, y: 0 },
            4: { x: 90, y: 0 },
        };

        function DiceCube({ value, rollId }) {
            const spinRef = useRef(0);
            const computeTransform = (v) => {
                spinRef.current += 2;
                const target = FACE_ROTATION[v];
                const x = target.x + spinRef.current * 360;
                const y = target.y + spinRef.current * 360;
                return `rotateX(${x}deg) rotateY(${y}deg)`;
            };
            const [transform, setTransform] = useState(() => computeTransform(value));
            useEffect(() => {
                setTransform(computeTransform(value));
            }, [rollId]);

            return (
                <div
                    className="dice-cube"
                    style={{
                        transform,
                        transition: "transform 0.7s cubic-bezier(.34,1.56,.64,1)",
                    }}
                >
                    <div className="dice-face front">  <DiceFace value={1} /> </div>
                    <div className="dice-face back">   <DiceFace value={6} /> </div>
                    <div className="dice-face right">  <DiceFace value={2} /> </div>
                    <div className="dice-face left">   <DiceFace value={5} /> </div>
                    <div className="dice-face top">    <DiceFace value={3} /> </div>
                    <div className="dice-face bottom"> <DiceFace value={4} /> </div>
                </div>
            );
        }


        function Dice({ value, rollId, isRolling, onRoll }) {
            return (
                <div className="dice-wrap">
                    <div className={"dice3d" + (isRolling ? " rolling" : " can-roll")} onClick={onRoll}>
                        <DiceCube value={value} rollId={rollId} />
                    </div>
                </div>
            );
        }

        const CELL_TYPES = {
            EMPTY: "empty",
            PATH: "path",
            YARD: "yard",
            SAFE: "safe",
            HOME: "home",
            CENTER: "center"
        };

        function getCellBackground(cell) {
            switch (cell.type) {
                case CELL_TYPES.YARD:
                    return COLOR_HEX[cell.color].main;
                case CELL_TYPES.PATH:
                    return cell.color ? COLOR_HEX[cell.color].main : "#ffffff";
                case CELL_TYPES.HOME:
                    return COLOR_HEX[cell.color].main;
                case CELL_TYPES.CENTER:
                    return "#ffffff";
                default:
                    return "#ffffff";
            }
        }

        function Cell({ board }) {
            return (
                <>
                    {board.map((row) =>
                        row.map((cell) => {
                            const background = getCellBackground(cell);
                            return (
                                <div
                                    key={`${cell.row}-${cell.col}`}
                                    className={"cell" + (cell.safe ? " safe" : "")}
                                    style={{
                                        gridRow: cell.row + 1,
                                        gridColumn: cell.col + 1,
                                        background: background,
                                        border: cell.type === CELL_TYPES.PATH ? "1px solid #999" : cell.type === CELL_TYPES.YARD ? "none" : "1px solid #d9d9d9"
                                    }}
                                />
                            );
                        })
                    )}
                </>
            );
        }

        function setCell(board, row, col, data) {
            Object.assign(board[row][col], data);
        }
        function fillRect(board, startRow, startCol, rows, cols, data) {
            for (let r = startRow; r < startRow + rows; r++) {
                for (let c = startCol; c < startCol + cols; c++) {
                    setCell(board, r, c, data);
                }
            }
        }

        function buildHomeCols() {
            const cols = { green: [], yellow: [], blue: [], red: [] };
            for (let c = 1; c <= 5; c++) cols.green.push([7, c]);
            for (let r = 1; r <= 5; r++) cols.yellow.push([r, 7]);
            for (let c = 13; c >= 9; c--) cols.blue.push([7, c]);
            for (let r = 13; r >= 9; r--) cols.red.push([r, 7]);
            return cols;
        }
        const HOME_COLS = buildHomeCols();

        function buildCenterCoords() {
            const coords = [];
            for (let r = 6; r <= 8; r++) {
                for (let c = 6; c <= 8; c++) {
                    coords.push([r, c]);
                }
            }
            return coords;
        }
        const CENTER_COORDS = buildCenterCoords();

        const CENTER_CELLS = {
            yellow: [6.3, 7],
            green: [7, 6.3],
            blue: [7, 7.7],
            red: [7.7, 7],
        };

        const BOARD_SIZE = 15;
        function createBoard() {
            const board = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                const currentRow = [];
                for (let col = 0; col < BOARD_SIZE; col++) {
                    currentRow.push({
                        row,
                        col,
                        type: CELL_TYPES.EMPTY,
                        color: null,
                        safe: false,
                        arrow: null
                    });

                }
                board.push(currentRow);
            }
            // Paint the four home yards in their respective corners
            fillRect(board, 0, 0, 6, 6, {
                type: CELL_TYPES.YARD,
                color: "green"
            });
            fillRect(board, 0, 9, 6, 6, {
                type: CELL_TYPES.YARD,
                color: "yellow"
            });
            fillRect(board, 9, 0, 6, 6, {
                type: CELL_TYPES.YARD,
                color: "red"
            });
            fillRect(board, 9, 9, 6, 6, {
                type: CELL_TYPES.YARD,
                color: "blue"
            });
            TRACK_COORDS.forEach(([row, col]) => {
                setCell(board, row, col, {
                    type: CELL_TYPES.PATH
                });
            });
            // Paint home columns and entry cells — the 6 squares leading to the center for each color
            Object.keys(HOME_COLS).forEach((color) => {
                HOME_COLS[color].forEach(([row, col]) => {
                    setCell(board, row, col, { type: CELL_TYPES.HOME, color });
                });
            });
            // Paint safe cells — positions on the global track where tokens can't be captured
            SAFE_GLOBAL.forEach((globalIdx) => {
                const [row, col] = TRACK_COORDS[globalIdx];
                setCell(board, row, col, {
                    safe: true
                });
            });

            // Paint entry arrows — the track cell just before each color's home column,
            Object.keys(ENTRY_ARROWS).forEach((color) => {
                const [row, col] = ENTRY_ARROWS[color];
                setCell(board, row, col, { color });
            });

            // Paint center — the 3x3 block where all tokens finish
            CENTER_COORDS.forEach(([row, col]) => {
                setCell(board, row, col, {
                    type: CELL_TYPES.CENTER
                });
            });

            return board;
        }

        function createInitialTokens(activeColors) {
            const tokens = [];
            activeColors.forEach(color => {
                for (let i = 0; i < 4; i++) {
                    tokens.push({ id: color + "-" + i, color, tokenIdx: i, pos: -1 });
                }
            });
            return tokens;
        }

        function getMovableTokenIds(tokens, color, dice) {
            const movable = [];
            tokens.forEach(t => {
                if (t.color !== color) return;
                if (t.pos === -1) {
                    if (dice === 6) movable.push(t.id); // needs a 6 to leave yard
                    return;
                }
                if (t.pos === 56) return; // already finished
                const newPos = t.pos + dice;
                if (newPos <= 56) movable.push(t.id); // can't overshoot past home
            });
            return movable;
        }

        function applyCapture(tokens, movedToken) {
            if (movedToken.pos < 0 || movedToken.pos > 50) return { tokens, captured: false };
            const globalIdx = (START_OFFSET[movedToken.color] + movedToken.pos) % 52;
            const isSafe = SAFE_GLOBAL.includes(globalIdx);
            if (isSafe) return { tokens, captured: false };
            let captured = false;
            const result = tokens.map(t => {
                if (t.color === movedToken.color) return t;
                if (t.pos < 0 || t.pos > 50) return t;
                const rivalGlobalIdx = (START_OFFSET[t.color] + t.pos) % 52;
                if (rivalGlobalIdx === globalIdx) {
                    captured = true;
                    return { ...t, pos: -1 };
                }
                return t;
            });
            return { tokens: result, captured };
        }

        function isColorFinished(tokens, color) {
            return tokens.filter(t => t.color === color).every(t => t.pos === 56);
        }

        function Board({ tokens, movableTokenIds, onTokenClick }) {
            const board = useMemo(() => createBoard(), []);
            const tokenGroups = useMemo(() => {
                const groups = {};
                tokens.forEach(token => {
                    const { row, col } = tokenCoord(
                        token.color,
                        token.pos,
                        token.tokenIdx
                    );
                    const key = `${row}-${col}`;
                    if (!groups[key]) {
                        groups[key] = [];
                    }
                    groups[key].push(token);
                });
                return groups;
            }, [tokens]);

            return (
                <div className="board">
                    <Cell board={board} />
                    <HomeYard color="green" />
                    <HomeYard color="yellow" />
                    <HomeYard color="red" />
                    <HomeYard color="blue" />
                    <CenterTriangle />
                    {Object.values(tokenGroups).flatMap(group =>
                        group.map((token, index) => (
                            <Token
                                key={token.id}
                                color={token.color}
                                tokenIdx={token.tokenIdx}
                                pos={token.pos}
                                stackCount={group.length}
                                stackOffset={index}
                                movable={movableTokenIds.includes(token.id)}
                                onClick={() => onTokenClick(token.id)}
                            />
                        ))
                    )}
                </div>
            );
        }

        function PlayerPanel({ player, isCurrent, diceState, onRoll }) {
            return (
                <div
                    className={`flex items-center gap-1.5 bg-white px-1.5 py-1.5 rounded-lg shadow-lg min-w-[110px] transition-all duration-200 ${isCurrent ? "ring-2" : ""}`}
                    style={{
                        "--tw-ring-color": COLOR_HEX[player.color].main
                    }}
                >
                    <div className="w-8 h-8 rounded-full flex items-center justify-center bg-gray-100">
                        <ColorGlyph
                            color={player.color}
                            size={34}
                        />
                    </div>
                    <div className="flex 1">
                        <div className="font-bold text-sm">
                            {player.name}
                        </div>
                        <div className="text-[10px] text-gray-500">
                            {isCurrent ? "Turn" : ""}
                        </div>
                    </div>
                    <Dice
                        value={diceState[player.color].value}
                        rollId={diceState[player.color].rollId}
                        isRolling={diceState[player.color].rolling}
                        onRoll={isCurrent ? onRoll : undefined}
                    />
                </div>
            );
        }
        function GameScreen({ setScreen, players }) {
            const ACTIVE_COLORS = players.map(p => p.color);
            const [tokens, setTokens] = useState(() => createInitialTokens(ACTIVE_COLORS));
            const [currentTurnIdx, setCurrentTurnIdx] = useState(0);
            const [hasRolled, setHasRolled] = useState(false);
            const currentColor = ACTIVE_COLORS[currentTurnIdx];
            const [diceState, setDiceState] = useState(
                ACTIVE_COLORS.reduce((obj, color) => {
                    obj[color] = {
                        value: 1,
                        rolling: false,
                        rollId: 0
                    };
                    return obj;
                }, {})
            );
            const [winner, setWinner] = useState(null);
            const [movingToken, setMovingToken] = useState(null);
            const [sixCount, setSixCount] = useState(0);
            const [soundOn, setSoundOn] = useState(true);

            const toggleSound = () => {
                const next = !soundOn;
                setSoundOn(next);
                setSoundEnabled(next);
            };

            function getMovePath(token, steps) {
                const path = [];
                let current = token.pos;
                if (current === -1) {
                    path.push(0);
                    return path;
                }
                for (let i = 1; i <= steps; i++) {
                    current++;
                    if (current > 56) {
                        break;
                    }
                    path.push(current);
                }
                return path;
            }

            function delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            async function moveToken(tokenId, path) {
                for (const position of path) {
                    await delay(300);
                    setTokens(prev =>
                        prev.map(t => {
                            if (t.id !== tokenId)
                                return t;
                            return {
                                ...t,
                                pos: position
                            };
                        })
                    );
                    playSound("move");
                    if (position === 56) playSound("pass");
                }
            }

            const onExit = () => {
                setScreen("home");
            };

            const handleRoll = () => {
                if (diceState[currentColor].rolling || hasRolled || movingToken) return;
                setDiceState(prev => ({
                    ...prev,
                    [currentColor]: { ...prev[currentColor], rolling: true }
                }));
                setTimeout(() => {
                    const roll = Math.floor(Math.random() * 6) + 1;
                    setDiceState(prev => ({
                        ...prev,
                        [currentColor]: { value: roll, rolling: false, rollId: prev[currentColor].rollId + 1 }
                    }));
                    playSound("dice");
                    let newSixCount = sixCount;
                    roll === 6 ? newSixCount++ : newSixCount = 0;
                    if (newSixCount === 3) {
                        alert("Three consecutive sixes! Turn skipped.");
                        setSixCount(0);
                        setCurrentTurnIdx(
                            prev => (prev + 1) % ACTIVE_COLORS.length
                        );
                        setHasRolled(false);
                        return;
                    }
                    setSixCount(newSixCount);
                    const movable = getMovableTokenIds(tokens, currentColor, roll);
                    if (movable.length === 0) {
                        if (roll !== 6) {
                            setSixCount(0);
                            setCurrentTurnIdx(prev => (prev + 1) % ACTIVE_COLORS.length);
                        }
                        setHasRolled(false);
                    } else {
                        setHasRolled(true);
                    }
                }, 550);
            };

            const handleTokenClick = async (tokenId) => {
                if (movingToken) return;
                const token = tokens.find(t => t.id === tokenId);
                if (!token) return;
                setMovingToken(tokenId);
                const path = getMovePath(token, token.pos === -1 ? 1 : diceState[currentColor].value);
                await moveToken(tokenId, path);
                setTokens(prev => {
                    const movedToken = prev.find(t => t.id === tokenId);
                    const { tokens: result, captured } = applyCapture(prev, movedToken);
                    if (captured) playSound("capture");
                    if (isColorFinished(result, movedToken.color)) {
                        setWinner(movedToken.color);
                        playSound("win");
                    }
                    return result;
                });
                setMovingToken(null);
                setHasRolled(false);
                if (diceState[currentColor].value !== 6) {
                    setCurrentTurnIdx(
                        prev => (prev + 1) % ACTIVE_COLORS.length
                    );
                }
            };

            return (
                <div className="game flex gap-[22px] items-start justify-center flex-wrap">
                    {winner && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div className="winner-card">
                                <h2 style={{ color: COLOR_HEX[winner].main, fontFamily: "'Baloo 2', sans-serif", fontSize: "26px", fontWeight: 800, marginBottom: "8px" }}>
                                    {winner.charAt(0).toUpperCase() + winner.slice(1)} Wins!
                                </h2>
                                <button className="start-btn" onClick={onExit}>Back to Menu</button>
                            </div>
                        </div>
                    )}
                    <div className="flex flex-col items-center gap-3.5">
                        <div className="flex items-center justify-between w-full max-w-[600px]">
                            <div className="flex items-center gap-2.5">
                                <button
                                    className="bg-white/10 text-[#FBF7EE] border border-white/20 rounded-[10px] py-2 px-3.5 text-[13px] font-semibold hover:bg-white/20"
                                    onClick={onExit}
                                >
                                    ← Menu
                                </button>
                                <span className="text-[#FBF7EE] font-['Baloo_2'] text-xl font-bold">Ludo Rex</span>
                            </div>
                        </div>
                        <button
                            onClick={toggleSound}
                            className="absolute top-1 right-4 z-40 bg-white/10 text-[#FBF7EE] border border-white/20 rounded-[10px] py-2 px-3.5 text-[13px] font-semibold hover:bg-white/20"
                        >
                            {soundOn ? "🔊" : "🔇"}
                        </button>
                        <div className="relative">
                            <div className="board-shell">
                                <Board
                                    tokens={tokens}
                                    movableTokenIds={movingToken ? [] : hasRolled ? getMovableTokenIds(tokens, currentColor, diceState[currentColor].value) : []}
                                    onTokenClick={handleTokenClick}
                                />
                            </div>

                            {players.map(p => {
                                const cornerClass = {
                                    green: "absolute left-2",
                                    yellow: "absolute right-2",
                                    red: "absolute left-2",
                                    blue: "absolute right-2",
                                }[p.color];
                                const cornerStyle = {
                                    green: { top: "15px" },
                                    yellow: { top: "15px" },
                                    red: { top: "calc(100% + 15px)" },
                                    blue: { top: "calc(100% + 15px)" },
                                }[p.color];

                                return (
                                    <div key={p.color} className={cornerClass} style={cornerStyle}>
                                        <PlayerPanel
                                            player={p}
                                            isCurrent={currentColor === p.color}
                                            diceState={diceState}
                                            onRoll={handleRoll}
                                        />
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function HomeScreen({ setScreen, setPlayers }) {
            const [mode, setMode] = useState("bot");
            const modeInfo = MODES.find(m => m.id === mode);
            const maxPlayers = modeInfo.players;
            const [humanColor, setHumanColor] = useState("red");

            // colors assigned in order for the number of players in this mode
            const activeColorsForCount = (n) => {
                // Spread players around the board for visual balance
                if (n === 2) return ["red", "yellow"];
                if (n === 3) return ["red", "green", "yellow"];
                return ["red", "green", "yellow", "blue"];
            };

            const availableColors = activeColorsForCount(maxPlayers);

            useEffect(() => {
                if (!availableColors.includes(humanColor)) {
                    setHumanColor(availableColors[0]);
                }
                // eslint-disable-next-line
            }, [mode]);

            const handleStart = () => {
                const colors = activeColorsForCount(maxPlayers);
                let players;
                if (modeInfo.isBot) {
                    players = colors.map(c => ({
                        color: c,
                        isBot: c !== humanColor,
                        name: c === humanColor ? "You" : "Bot"
                    }));
                } else {
                    players = colors.map((c, i) => ({
                        color: c,
                        isBot: false,
                        name: "Player " + (i + 1)
                    }));
                }
                setPlayers(players)
                setScreen("game");
                //onStart({ players, modeLabel: modeInfo.label });
            };
            return (
                <div className="home flex flex-col items-center justify-center h-screen px-4 py-6 overflow-y-auto">
                    <div className="w-full max-w-sm shadow-xl">
                        <h3 className="text-yellow-300 font-extrabold text-lg mb-1">Choose a mode</h3>
                        <p className="text-white/70 text-xs mb-3">Pick how many are playing.</p>
                        <div className="grid grid-cols-2 gap-3 mb-5">
                            {MODES.map(m => (
                                <button
                                    key={m.id}
                                    className={"flex flex-col items-center justify-center gap-1 rounded-xl border-2 py-3 px-2 transition " +
                                        (mode === m.id
                                            ? "bg-yellow-400 border-yellow-200 text-blue-900"
                                            : "bg-blue-800 border-blue-600 text-white hover:bg-blue-700")
                                    }
                                    onClick={() => setMode(m.id)}
                                >
                                    <div className="flex gap-1 mb-1">
                                        {Array.from({ length: m.dots }).map((_, i) => (
                                            <span key={i} className="w-2.5 h-2.5 rounded-full" style={{ background: i === 0 ? "var(--red)" : i === 1 ? "var(--yellow)" : i === 2 ? "var(--green)" : "var(--blue)" }} />
                                        ))}
                                    </div>
                                    <span className="font-bold text-sm">{m.label}</span>
                                    <span className="text-[10px] opacity-70">{m.sub}</span>
                                </button>
                            ))}
                        </div>

                        <h3 className="text-yellow-300 font-extrabold text-lg mb-1">Your color</h3>
                        <p className="text-white/70 text-xs mb-3">
                            {modeInfo.isBot ? "Choose your token color; the rest go to the bot." : "Choose your token color for this match."}
                        </p>
                        <div className="flex justify-center gap-3 mb-5">
                            {["red", "green", "yellow", "blue"].map(c => {
                                const enabled = availableColors.includes(c);
                                return (
                                    <button
                                        key={c}
                                        disabled={!enabled}
                                        className={
                                            "w-12 h-12 rounded-full flex items-center justify-center border-4 transition " +
                                            (humanColor === c ? "border-yellow-300 scale-110" : "border-transparent") +
                                            (!enabled ? " opacity-30 cursor-not-allowed" : " cursor-pointer")
                                        }
                                        style={{ background: COLOR_HEX[c].soft }}
                                        onClick={() => enabled && setHumanColor(c)}
                                        title={c}
                                    >
                                        <ColorGlyph color={c} />
                                    </button>
                                );
                            })}
                        </div>

                        <button className="w-full bg-gradient-to-b from-yellow-300 to-yellow-500 border-2 border-yellow-200 text-blue-900 font-extrabold text-lg py-3 rounded-xl shadow-md hover:from-yellow-200 hover:to-yellow-400 transition" onClick={handleStart}>Start Game</button>

                        <p className="text-white/60 text-[11px] mt-3 leading-snug">Roll a 6 to bring a token out of base. Land on a rival to send it home — unless they're on a star or start square. Get all 4 tokens to the center to win.</p>
                    </div>
                </div>
            );
        }

        function App() {
            const [screen, setScreen] = useState("home");
            const [players, setPlayers] = useState(null)
            return (
                <>
                    <div className="app">
                        {screen === "home" && (
                            <HomeScreen setScreen={setScreen} setPlayers={setPlayers} />
                        )}
                        {screen === "game" && (
                            <GameScreen setScreen={setScreen} players={players} />
                        )};
                    </div>
                </>
            )
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
