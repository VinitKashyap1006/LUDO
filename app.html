            let bandCount = Math.ceil(positions.length / 3);
            for (let band = 0; band < bandCount; band++) {
                const i = band * 3;
                if (i >= positions.length) break;
                const y = positions[i].y;

                const side = (band % 2 === 0) ? LEFT_RIGHT_SLOTS[0] : LEFT_RIGHT_SLOTS[1];
                const isGiftBand = (band % 5 === 0);
                const slotFrac = isGiftBand
                    ? GIFT_SLOTS[Math.floor(Math.random() * GIFT_SLOTS.length)]
                    : side;
                const rendererKey = isGiftBand ? "gift" : nextLeftRight();

                items.push({
                    key: "deco-lr-" + band,
                    x: slotFrac * mapW + (Math.random() - 0.5) * 16,
                    y: y + (Math.random() - 0.5) * 30,
                    size: 70 + Math.floor(Math.random() * 24),
                    rendererKey: rendererKey,
                    rotate: (Math.random() - 0.5) * 14,
                    duration: 2.4 + Math.random() * 1.4,
                    delay: Math.random() * 2,
                });

                for (let s = 0; s < 2; s++) {
                    const slot = LEFT_RIGHT_SLOTS[s % 2];
                    const sign = (s % 2 === 0) ? 1 : -1;
                    stars.push({
                        key: "star-" + band + "-" + s,
                        x: slot * mapW + (Math.random() - 0.5) * 70 * sign,
                        y: y + (Math.random() - 0.5) * 60,
                        size: 30 + Math.random() * 20,
                    });
                }
            }
            return { items: items, stars: stars };
        }

        function MapDecorations({ positions, mapW }) {
            const built = useMemo(function () { return buildDecorations(positions, mapW); }, [positions, mapW]);
            const items = built.items;
            const stars = built.stars;

            return (
                <>
                    {items.map(function (d) {
                        const renderFn = DECO_RENDERERS[d.rendererKey];
                        if (!renderFn) return null;
                        return (
                            <div
                                key={d.key}
                                style={{
                                    position: "absolute",
                                    left: d.x,
                                    top: d.y,
                                    transform: "translate(-50%, -50%) rotate(" + d.rotate + "deg)",
                                    animation: "decoBob " + d.duration + "s ease-in-out " + d.delay + "s infinite",
                                    pointerEvents: "none",
                                    zIndex: 1,
                                    filter: "drop-shadow(0 2px 3px rgba(0,0,0,0.18))",
                                }}
                            >
                                {renderFn(d.size)}
                            </div>
                        );
                    })}
                    {stars.map(function (s) {
                        return (
                            <div
                                key={s.key}
                                style={{
                                    position: "absolute",
                                    left: s.x,
                                    top: s.y,
                                    transform: "translate(-50%, -50%)",
                                    animation: "decoPulse 2.6s ease-in-out infinite",
                                    pointerEvents: "none",
                                    zIndex: 1,
                                }}
                            >
                                <DecoStar3D size={s.size} />
                            </div>
                        );
                    })}
                </>
            );
        }
        function MapHeaderBar({ soundOn, toggleSound, score, coins, highestCompleted, totalLevels, onExit }) {
            const { t } = useTranslation();
            const pct = Math.min(100, Math.round((highestCompleted / totalLevels) * 100));

            const [showRewardPopup, setShowRewardPopup] = useState(false);
            const [loadingRewardHistory, setLoadingRewardHistory] = useState(false);
            const [rewardHistory, setRewardHistory] = useState([]);

            const [showScorePopup, setShowScorePopup] = useState(false);
            const [loadingScoreHistory, setLoadingScoreHistory] = useState(false);
            const [socreHistory, setScoreHistory] = useState([]);

            const fetchTransactionHistory = async () => {
                if (!token) return;

        function App() {
            const [screen, setScreen] = useState("map");
            const [players, setPlayers] = useState(null);

            const [soundOn, setSoundOn] = useState(true);

            const [score, setScore] = useState(0);
            const [coins, setCoins] = useState(0);
            const [highestLevel, setHighestLevel] = useState(1);
            const [resumeLoaded, setResumeLoaded] = useState(false);

            const [isGuest, setIsGuest] = useState(false);
            const [hasRated, setHasRated] = useState(false);

            const [activeLevel, setActiveLevel] = useState(1);
            const [highestCompleted, setHighestCompleted] = useState(0);
            const [levelStars, setLevelStars] = useState({});

            const [surveyLevelNumber, setSurveyLevelNumber] = useState(null);
            const [showSurvey, setShowSurvey] = useState(false);
            const [surveys, setSurveys] = useState([]);
            const [loadingSurveys, setLoadingSurveys] = useState(false);
            const [surveyError, setSurveyError] = useState(null);
            const [isNavigatingToSurvey, setIsNavigatingToSurvey] = useState(false);
            const [surveyType, setSurveyType] = useState(null);

            const [showLevelCompletePopup, setShowLevelCompletePopup] = useState(false);
            const [completingLevel, setCompletingLevel] = useState(false);

            useEffect(() => {
                const loadResume = async () => {
                    if (!token) { setResumeLoaded(true); return; }
                    try {
                        const res = await api.get(`/api/game/getResumeLevel?gameId=${offerId}`);
                        const resumeData = res.data?.result?.data;
                        if (resumeData?.currentLevel) {
                            setHighestCompleted(Math.max(0, resumeData.currentLevel - 1));
                            setActiveLevel(resumeData.currentLevel);
                            if (resumeData.metadata?.score != null) setScore(resumeData.metadata.score);
                            if (resumeData.metadata?.coins != null) setCoins(resumeData.metadata.coins);
                            if (resumeData.highestLevel != null) setHighestLevel(resumeData.highestLevel);
                        }
                    } catch (err) {
                        console.log("Resume fetch error:", err.message);
                    } finally {
                        setResumeLoaded(true);
                    }
                };
                loadResume();
            }, []);

            const fetchSurveys = async () => {
                setLoadingSurveys(true);
                setSurveyError(null);
                try {
                    const uid = localStorage.getItem("userId");
                    const visitorId = getVisitorId();
                    let url = `/api/survey/getSurveyFromTS?type=1`;
                    if (uid) url += `&userId=${uid}`;
                    else if (visitorId) url += `&visitorId=${visitorId}`;
                    const res = await api.get(url);
                    let list = [];
                    if (res.data?.result?.data) list = res.data.result.data;
                    else if (res.data?.data) list = res.data.data;
                    setSurveys(Array.isArray(list) ? list : []);
                } catch (e) {
                    setSurveyError("Failed to load surveys");
                    setSurveys([]);
                } finally {
                    setLoadingSurveys(false);
                }
            };

            const handleSurveyClick = async (survey) => {
                const uid = localStorage.getItem("userId");
                const visitorId = getVisitorId();
                const payload = {
                    uid: uid ? parseInt(uid) : null,
                    visitorId: !uid ? visitorId : null,
                    type: 4,
                    landing_url: survey.LiveURL || survey.url,
                    cpi: survey.CPI || survey.cpi || 0,
                    surveyId: survey.id || survey.surveyId,
                    loi: survey.LOI || survey.loi || 0,
                    gameId: offerId
                };
                try {
                    setLoadingSurveys(true);
                    const res = await api.post("/api/survey/create-participant", payload);
                    if (res.data?.success && res.data?.result?.data?.landing_url) {
                        const gateLevel = surveyLevelNumber;
                        if (surveyType === 'hint') {
                            localStorage.removeItem("ludo_regina_survey_required");
                        } else if (surveyType === 'shuffle') {
                            localStorage.removeItem("ludo_regina_shuffle_survey_required");
                        }
                        else if (gateLevel) {
                            localStorage.removeItem(`ludo_regina_survey_required_level_${gateLevel}`);
                            localStorage.removeItem("ludo_regina_pending_survey_gate_level");
                        }
                        setIsNavigatingToSurvey(true);
                        setShowSurvey(false);
                        window.parent.postMessage({
                            type: 'NAVIGATE_TO_SURVEY',
                            url: res.data.result.data.landing_url
                        }, '*');
                    }
                } catch (err) {
                    console.error("Survey click error:", err);
                } finally {
                    setLoadingSurveys(false);
                }
            };

            const createGameSessionPayload = (levelData, coins, currentScore, override = {}, userRating = null) => {
                const nextLevel = override.level ?? levelData.level;
                const finalScore = override.score ?? currentScore;
                const finalCoins = override.coins ?? coins;
                const finalHighestLevel = Math.max(highestLevel, nextLevel);
                return {
                    currentLevel: nextLevel,
                    difficulty: levelData.difficulty,
                    gameId: offerId,
                    highestLevel: finalHighestLevel,
                    metadata: {
                        score: finalScore,
                        coins: finalCoins,
                    },
                    coins: finalCoins,
                    score: finalScore,
                    totalCoins: finalCoins,
                    totalScore: finalScore,
                    visitorId: getVisitorId(),
                    rating: userRating ?? null,
                };
            };
            const startGameSession = async (levelData = currentLevel, coins, currentScore, override = {}, userRating = null) => {
                try {
                    const payload = createGameSessionPayload(levelData, coins, currentScore, override, userRating);
                    const res = await api.post("/api/game/startGameSession", payload);
                } catch (err) {
                    console.log("Start game session error:", err);
                    return null;
                }
            };

            const levelProgress = async (levelData = currentLevel, status = 0, coins, override = {}) => {
                try {
                    const nextLevel = override.level ?? Number(levelData.level);
                    const payload = {
                        gameId: offerId,
                        currentLevel: nextLevel,
                        difficulty: levelData.difficulty,
                        rating: override.rating ?? null,
                        levelRating: override.levelRating ?? 0,
                        metadata: {
                            score: override.score ?? score,
                            coins: override.coins ?? coins,
                        },
                        status: status,
                        visitorId: getVisitorId()
                    };
                    const res = await api.post("/api/game/levelProgress", payload);
                    // ← NEW: Guest completed a level, tell parent to show signup
                    if (res.data.result?.requiresAuth && status === 1) {
                        setIsGuest(true);
                        if (window.parent && window.parent !== window) {
                            window.parent.postMessage({
                                type: 'requireAuth',
                                reason: 'claimReward',
                                level: levelData.level,
                                coins: 20,
                                score: override.score,
                            }, '*');
                        }
                        return { success: true, requiresAuth: true };
                    }
                } catch (err) {
                    console.log("Level progress error:", err);
                    return null;
                }
            };
            const gameProgress = async (completion = 0, coins, currentScore) => {
                try {
                    const payload = {
                        completion,
                        currentScore: currentScore,
                        totalScore: currentScore,
                        totalCoins: coins,
                        metadata: {
                            score: currentScore,
                            coins,
                            currentLevel: currentLevel.level,
                            difficulty: currentLevel.difficulty,
                        },
                        gameId: offerId,
                        visitorId: getVisitorId()
                    };
                    const res = await api.post("/api/game/gameProgress", payload);
                } catch (err) {
                    console.log("Game progress error:", err);
                    return null;
                }
            };

            const handleLevelComplete = async () => {
                setCompletingLevel(true);
                try {
                    const finishedLevel = activeLevel;
                    const finishedDifficulty = difficultyForLevel(finishedLevel);
                    const nextLevel = Math.min(finishedLevel + 1, TOTAL_LEVELS);
                    const nextDifficulty = difficultyForLevel(nextLevel);

                    const completion = Math.round((finishedLevel / TOTAL_LEVELS) * 100);

                    await levelProgress({ level: finishedLevel, difficulty: finishedDifficulty }, 1, coins);
                    await startGameSession({ level: nextLevel, difficulty: nextDifficulty }, coins, score, { level: nextLevel });
                    await gameProgress(completion, coins, score);

                    setHighestCompleted(prev => Math.max(prev, finishedLevel));
                    setLevelStars(prev => ({ ...prev, [finishedLevel]: prev[finishedLevel] || (2 + Math.round(Math.random())) }));
                    setShowLevelCompletePopup(true);
                } catch (err) {
                    console.log("Level completion error:", err);
                } finally {
                    setCompletingLevel(false);
                }
            };

            const gamePlayers = useMemo(() => {
                if (!players) return players;
                const difficulty = difficultyForLevel(activeLevel);
                return players.map(p => p.isBot ? { ...p, difficulty } : p);
            }, [players, activeLevel]);

            const startLevel = async (lvl) => {
                const nextLevel = Math.min(lvl, TOTAL_LEVELS);
                const difficulty = difficultyForLevel(nextLevel);
                const levelData = { level: nextLevel, difficulty };
                setActiveLevel(nextLevel);
                setScreen("game");
                await startGameSession(levelData, coins, score);
                await levelProgress(levelData, 0, coins);
            };

            const handleLevelWon = (lvl) => {
                setHighestCompleted(prev => Math.max(prev, lvl));
                setLevelStars(prev => ({ ...prev, [lvl]: prev[lvl] || (2 + Math.round(Math.random())) }));
            };

            const toggleSound = () => {
                setSoundOn(prev => {
                    const next = !prev;
                    soundState.enabled = next;
                    return next;
                });
            };

            const onExit = () => {
                setScreen("home");
            };

            return (
                <>
                    <div className="app">
                        {screen === "home" && (
                            <HomeScreen
                                setScreen={setScreen}
                                setPlayers={setPlayers}
                            />
                        )}
                        {screen === "map" && (
                            <MapScreen
                                highestCompleted={highestCompleted}
                                levelStars={levelStars}
                                onSelectLevel={startLevel}
                                soundOn={soundOn}
                                toggleSound={toggleSound}
                                score={score}
                                coins={coins}
                                highestLevel={highestLevel}
                                onExit={onExit}
                            />
                        )}
                        {screen === "game" && gamePlayers && (
                            <GameScreen
                                setScreen={setScreen}
                                players={gamePlayers}
                                level={activeLevel}
                                soundOn={soundOn}
                                toggleSound={toggleSound}
                                onLevelComplete={handleLevelComplete}
                                onExit={onExit}
                            />
                        )};
                        {showLevelCompletePopup && (
                            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }}>
                                <div className="winner-card">
                                    <h2 style={{ fontFamily: "'Baloo 2', sans-serif", fontSize: "26px", fontWeight: 800, marginBottom: "8px" }}>
                                        Level {activeLevel} Complete! 🎉
                                    </h2>
                                    <button className="start-btn" onClick={() => { setShowLevelCompletePopup(false); setScreen("map"); }}>
                                        Continue
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                    {showSurvey && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[300] p-4">
                            <div className="bg-gradient-to-br from-[#1e293b] to-[#0f172a] border border-white/10 rounded-3xl w-[460px] max-h-[90vh] p-8 text-white flex flex-col">
                                <h2 className="text-2xl font-extrabold text-center mb-2">
                                    {surveyType === 'hint'
                                        ? '💡' + t('Unlock_Hint')
                                        : surveyType === 'shuffle'
                                            ? '🔀 ' + t('Unlock_Shuffle')
                                            : (`${t('Level')} ${surveyLevelNumber} ${t('Complete')}! 🎉`)}
                                </h2>
                                <p className="text-white/70 mb-6 text-sm text-center">
                                    {surveyType === 'hint'
                                        ? t('Complete_a_survey_to_use_your_hint')
                                        : surveyType === 'shuffle'
                                            ? t('Complete_a_survey_to_use_your_shuffle')
                                            : t("Complete_a_survey_to_continue_to_the_next_level")}
                                </p>
                                <div className="flex-1 overflow-y-auto space-y-4">
                                    {loadingSurveys ? (
                                        <div className="py-12 flex flex-col items-center gap-3">
                                            <div className="w-10 h-10 border-4 border-white/10 border-t-blue-500 rounded-full animate-spin"></div>
                                            <p className="text-white/40 text-xs">{t("Loading_surveys")}...</p>
                                        </div>
                                    ) : surveyError ? (
                                        <div className="py-6 text-center bg-red-500/10 rounded-xl border border-red-500/20">
                                            <p className="text-red-400 text-sm">{surveyError}</p>
                                            <button onClick={fetchSurveys} className="mt-3 text-white/60 text-xs underline">
                                                {t("Try_Again")}
                                            </button>
                                        </div>
                                    ) : surveys.length > 0 ? (
                                        surveys.map((survey, i) => (
                                            <div
                                                key={i}
                                                onClick={() => handleSurveyClick(survey)}
                                                className="cursor-pointer flex items-center justify-between rounded-2xl px-5 py-4 bg-white/5 border border-white/10 hover:border-green-400/40 hover:bg-white/10 transition-all"
                                            >
                                                <div>
                                                    <h4 className="text-sm font-bold">
                                                        {survey.LOI || 5} {t("mins")}
                                                    </h4>
                                                    <p className="text-[10px] text-white/40 uppercase">
                                                        {t("Reward_Guaranteed")}
                                                    </p>
                                                </div>
                                                <span className="text-lg font-bold text-green-400">
                                                    🪙 {Number(survey.CPI || survey.cpi || 0).toFixed(2)}
                                                </span>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="py-6 text-center bg-white/5 rounded-xl border border-white/10">
                                            <p className="text-white/40 text-xs">{t("No_surveys_available")}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                    {isNavigatingToSurvey && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[400]">
                            <div className="flex flex-col items-center gap-4">
                                <div className="w-12 h-12 border-4 border-white/20 border-t-blue-500 rounded-full animate-spin"></div>
                                <p className="text-white text-sm font-medium">{t("Redirecting_to_survey")}</p>
                            </div>
                        </div>
                    )}
                </>
            )
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
