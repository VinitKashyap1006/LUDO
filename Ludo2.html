<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ludo King</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            overflow: hidden;
            background: #2455a5;
            background-image:
                linear-gradient(rgba(255, 255, 255, .03) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, .03) 2px, transparent 2px);
            background-size: 70px 70px;
        }

        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gameContainer {
            width: 100%;
            height: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            background: #2455a5;
            position: relative;
            overflow: hidden;
        }

        .topPanel {
            height: 90px;
            background: #14407d;
            border-bottom: 3px solid #0e2d57;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .bottomPanel {
            height: 90px;
            background: #14407d;
            border-top: 3px solid #0e2d57;
            display: flex;
            align-items: center;
            padding-left: 15px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .boardContainer {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .token {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            box-shadow:
                0 6px 10px rgba(0, 0, 0, 0.35),
                inset 0 2px 3px rgba(255, 255, 255, 0.6);
            border: 2px solid white;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🎯 Ludo King style PIN look */
        .token::after {
            content: "";
            width: 35%;
            height: 35%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
        }

        .token.movable {
            animation: pulse 1s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        function Board({ tokens }) {

            const getCoord = (pos, color) => {
                const start = START_INDEX[color];

                if (pos === -1) return null;

                const index = (start + pos) % PATH.length;
                return PATH[index];
            };

            return (
                <div style={{
                    width: "100%",
                    height: "100%",
                    display: "grid",
                    gridTemplateColumns: "repeat(15, 1fr)",
                    gridTemplateRows: "repeat(15, 1fr)"
                }}>

                    {/* GRID */}
                    {Array.from({ length: 225 }).map((_, i) => {
                        const r = Math.floor(i / 15);
                        const c = i % 15;

                        return (
                            <div
                                key={i}
                                style={{
                                    border: "1px solid #ddd",
                                    position: "relative"
                                }}
                            >
                                {/* TOKENS */}
                                {COLORS.map(color =>
                                    tokens[color].map((t, idx) => {
                                        const coord = getCoord(t.pos, color);
                                        if (!coord) return null;

                                        if (coord[0] === r && coord[1] === c) {
                                            return (
                                                <div
                                                    key={color + idx}
                                                    onClick={() => moveToken(color, idx)}
                                                    style={{
                                                        width: "60%",
                                                        height: "60%",
                                                        borderRadius: "50%",
                                                        background: color,
                                                        margin: "auto"
                                                    }}
                                                />
                                            );
                                        }

                                        return null;
                                    })
                                )}
                            </div>
                        );
                    })}

                </div>
            );
        }

        const PATH = [
            [6, 1], [6, 2], [6, 3], [6, 4], [6, 5],
            [5, 6], [4, 6], [3, 6], [2, 6], [1, 6], [0, 6],
            [0, 7],
            [0, 8],
            [1, 8], [2, 8], [3, 8], [4, 8], [5, 8],
            [6, 9], [6, 10], [6, 11], [6, 12], [6, 13], [6, 14],
            [7, 14],
            [8, 14],
            [8, 13], [8, 12], [8, 11], [8, 10], [8, 9],
            [9, 8], [10, 8], [11, 8], [12, 8], [13, 8], [14, 8],
            [14, 7],
            [14, 6],
            [13, 6], [12, 6], [11, 6], [10, 6], [9, 6],
            [8, 5], [8, 4], [8, 3], [8, 2], [8, 1], [8, 0],
            [7, 0],
            [6, 0]
        ];

        const SAFE = new Set([0, 8, 13, 21, 26, 34, 39, 47]);
        const gridKey = (r, c) => `${r}-${c}`;
        const COLORS = ["red", "green", "yellow", "blue"];

        const START_INDEX = {
            red: 0,
            green: 13,
            yellow: 26,
            blue: 39
        };

        function createTokens() {
            const obj = {};
            COLORS.forEach(color => {
                obj[color] = [
                    { id: 0, pos: -1 },
                    { id: 1, pos: -1 },
                    { id: 2, pos: -1 },
                    { id: 3, pos: -1 }
                ];
            });
            return obj;
        }
        const handleCapture = (color) => {

            setTokens(prev => {
                const updated = JSON.parse(JSON.stringify(prev));

                const currentTokens = updated[color];

                currentTokens.forEach((t) => {

                    if (t.pos < 0 || t.pos > 50) return;

                    const globalIndex =
                        (START_INDEX[color] + t.pos) % PATH.length;

                    // ❌ SAFE CELL CHECK
                    if (SAFE_INDEX.has(globalIndex)) return;

                    COLORS.forEach(enemy => {

                        if (enemy === color) return;

                        updated[enemy].forEach(enemyToken => {

                            if (enemyToken.pos < 0 || enemyToken.pos > 50) return;

                            const enemyIndex =
                                (START_INDEX[enemy] + enemyToken.pos) % PATH.length;

                            if (enemyIndex === globalIndex) {
                                enemyToken.pos = -1; // send home
                            }
                        });
                    });
                });

                return updated;
            });
        };
        const handleWinCheck = (color) => {

            const finished = tokens[color].filter(t => t.pos === 56).length;

            if (finished === 4) {
                alert(color.toUpperCase() + " WINS 🎉");
            }
        };
        function App() {
            const [tokens, setTokens] = React.useState(createTokens());
            const [dice, setDice] = React.useState(null);
            const [turn, setTurn] = React.useState(0);
            const currentColor = COLORS[turn];
            const rollDice = () => {
                const val = Math.floor(Math.random() * 6) + 1;
                setDice(val);
            };
            const nextTurn = () => {
                setTimeout(() => {
                    setTurn(t => (t + 1) % COLORS.length);
                    setDice(null);
                }, 300);
            };
            const moveToken = (color, index) => {

                if (color !== currentColor) return;
                if (!dice) return;

                setTokens(prev => {
                    const updated = JSON.parse(JSON.stringify(prev));
                    const token = updated[color][index];

                    // 🏠 ENTER FROM YARD
                    if (token.pos === -1) {
                        if (dice === 6) {
                            token.pos = 0;
                        }
                        return updated;
                    }

                    let newPos = token.pos + dice;

                    // 🏁 WIN CONDITION (simple cap)
                    if (newPos > 56) {
                        newPos = 56;
                    }

                    token.pos = newPos;

                    return updated;
                });

                setTimeout(() => {
                    handleCapture(color);
                    handleWinCheck(color);
                }, 50);

                if (dice !== 6) nextTurn();
                else setDice(null);
            };
            window.moveToken = moveToken;
            return (
                <div className="gameContainer">
                    <div className="topPanel">
                        {currentColor.toUpperCase()} TURN | Dice: {dice ?? "-"}
                    </div>
                    <div className="boardContainer">
                        <Board tokens={tokens} />
                    </div>
                    <div className="bottomPanel">
                        <button onClick={rollDice}>ROLL DICE</button>
                    </div>

                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />)

    </script>

</body>

</html>
