<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ludo Rex — Play Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- i18n Scripts for language translation -->
  <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    //const apiBaseUrl = params.get("apiBaseUrl");
    const apiBaseUrl = "http://localhost:7877";
  </script>
  <style>
    /*
          ============================================================
          THEME
          Four Ludo jewel-tones (red/green/yellow/blue) are the stars.
          Everything else — background, panels, chrome — is a quiet,
          dark indigo-plum "board-game-at-night" surface so the tokens
          and dice pop instead of competing with photo backgrounds.
          ============================================================
        */
    :root {
      --cream: #FBF7EE;
      --paper: #fff;
      --ink: #2B2620;
      --ink-soft: #6b6459;
      --board-line: #d8cfc0;

      --ludo-red: #E5484D;
      --ludo-red-dark: #B7282D;
      --ludo-green: #12A454;
      --ludo-green-dark: #0B7A3E;
      --ludo-yellow: #FFC229;
      --ludo-yellow-dark: #DB9B0A;
      --ludo-blue: #2E7BFA;
      --ludo-blue-dark: #1B57C4;

      --night-1: #170B2E;
      --night-2: #2A1554;
      --night-3: #3B1E6E;

      --yellow: #ffd76a;
      --yellow-dark: #e0a91f;
      --green-dark: #1f7a4d;
      --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 14px 40px rgba(10, 4, 30, 0.55);
      --shadow-glow: 0 0 0 1px rgba(255, 255, 255, 0.06), 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    /* Reused surface classes */
    .board-shell {
      box-shadow: var(--shadow-glow);
      border-radius: 30px;
      padding: 6px;
      background: conic-gradient(from 0deg,
          var(--ludo-red), var(--ludo-yellow), var(--ludo-green), var(--ludo-blue), var(--ludo-red));
      animation: haloSpin 14s linear infinite;
      position: relative;
    }

    .board-shell-inner {
      border-radius: 26px;
      background: var(--paper);
      overflow: hidden;
    }

    @keyframes haloSpin {
      0% {
        filter: hue-rotate(0deg) saturate(1);
      }

      100% {
        filter: hue-rotate(360deg) saturate(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .board-shell {
        animation: none;
      }
    }

    .panel-card {
      background: var(--cream);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .winner-card {
      background: linear-gradient(160deg, #fffdf7, var(--cream));
      border-radius: 26px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: var(--shadow-glow);
      max-width: 380px;
      width: min(90vw, 380px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .start-btn {
      background: linear-gradient(180deg, var(--ludo-yellow) 0%, var(--ludo-yellow-dark) 100%);
      color: #3a2600;
      border: none;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 11px 28px;
      border-radius: 13px;
      box-shadow: 0 5px 0 #9c6c10, var(--shadow-sm);
      transition: transform .1s ease, box-shadow .1s ease;
      cursor: pointer;
    }

    .start-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #9c6c10;
    }

    /* 15x15 board grid */
    .board {
      width: min(100%, 88vw);
      height: min(520px, 88vw);
      max-width: 480px;
      max-height: 480px;
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(15, 1fr);
      background: var(--paper);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 2px var(--board-line);
    }

    .cell {
      position: relative;
      border: 0.5px solid var(--board-line);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell.path {
      background: var(--paper);
    }

    .cell.safe::before {
      content: '★';
      position: absolute;
      font-size: 160%;
      color: rgba(43, 38, 32, 0.38);
    }

    .token {
      width: 70%;
      height: 70%;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.35), inset 0 2px 2px rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.85);
      cursor: pointer;
      transition: left .28s cubic-bezier(.4, 1.4, .6, 1), top .28s cubic-bezier(.4, 1.4, .6, 1), transform .15s ease;
      z-index: 5;
    }

    .token.movable {
      animation: tokenPulse 1s ease-in-out infinite;
      cursor: pointer;
    }

    .token.movable:hover {
      transform: scale(1.15);
    }

    .dice3d.can-roll {
      animation: diceIdle 1.8s ease-in-out infinite;
    }

    .dice3d.rolling {
      animation: diceRoll 0.55s ease-in-out;
    }

    .dice-wrap {
      perspective: 500px;
    }

    .dice-cube {
      position: relative;
      width: 42px;
      height: 42px;
      transform-style: preserve-3d;
    }

    .dice-face {
      position: absolute;
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #ffffff, #e8e0cc);
      border-radius: 9px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 0 0 1px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dice-face.front {
      transform: translateZ(21px);
    }

    .dice-face.back {
      transform: rotateY(180deg) translateZ(21px);
    }

    .dice-face.right {
      transform: rotateY(90deg) translateZ(21px);
    }

    .dice-face.left {
      transform: rotateY(-90deg) translateZ(21px);
    }

    .dice-face.top {
      transform: rotateX(90deg) translateZ(21px);
    }

    .dice-face.bottom {
      transform: rotateX(-90deg) translateZ(21px);
    }

    @keyframes tokenPulse {

      0%,
      100% {
        box-shadow: 0 2px 3px rgba(0, 0, 0, 0.35), inset 0 2px 2px rgba(255, 255, 255, 0.5), 0 0 0 0 rgba(255, 255, 255, 0.6);
      }

      50% {
        box-shadow: 0 2px 3px rgba(0, 0, 0, 0.35), inset 0 2px 2px rgba(255, 255, 255, 0.5), 0 0 0 6px rgba(255, 255, 255, 0);
      }
    }

    @keyframes diceIdle {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-4px) rotate(-4deg);
      }
    }

    @keyframes diceRoll {
      0% {
        transform: rotate(0deg) scale(1);
      }

      50% {
        transform: rotate(180deg) scale(1.12);
      }

      100% {
        transform: rotate(360deg) scale(1);
      }
    }

    /*
          App shell background: a quiet indigo-plum gradient built from
          the four ludo colors bleeding in softly at low opacity from
          each corner, instead of a stock photo.
        */
    .app {
      background:
        radial-gradient(circle at 8% 8%, rgba(229, 72, 77, 0.30), transparent 32%),
        radial-gradient(circle at 92% 8%, rgba(255, 194, 41, 0.28), transparent 32%),
        radial-gradient(circle at 8% 92%, rgba(18, 164, 84, 0.28), transparent 32%),
        radial-gradient(circle at 92% 92%, rgba(46, 123, 250, 0.30), transparent 32%),
        linear-gradient(160deg, var(--night-1), var(--night-2) 55%, var(--night-3));
      text-align: center;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      min-height: 100vh;
    }

    .home::before,
    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(229, 72, 77, 0.18), transparent 40%),
        radial-gradient(circle at 85% 15%, rgba(255, 194, 41, 0.16), transparent 40%),
        radial-gradient(circle at 20% 85%, rgba(18, 164, 84, 0.16), transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(46, 123, 250, 0.18), transparent 40%);
      z-index: 0;
      pointer-events: none;
    }

    /* FIXED width core (matches design brief: same width across
           desktop/tablet, edge-to-edge responsive only on small phones) */
    .home,
    .game {
      position: relative;
      width: 480px;
      max-width: 100vw;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .home>*,
    .game>* {
      position: relative;
      z-index: 1;
    }

    @media (max-width: 520px) {

      .home,
      .game {
        width: 100%;
      }
    }

    .map-outer {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #10203f;
    }

    .map-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      scrollbar-width: thin;
    }

    .map-header {
      padding: 14px 16px 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
      position: relative;
      z-index: 5;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      font-size: 19px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #fff;
      padding: 6px 12px;
      border-radius: 24px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.18);
      font-weight: 900;
      font-family: 'Baloo 2', sans-serif;
      font-size: 15px;
    }

    .avatar-ring {
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: #fff;
      border: 3.5px solid rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
      font-size: 28px;
    }

    .map-title {
      font-family: 'Baloo 2', sans-serif;
      color: #fff;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: .5px;
      text-align: center;
      margin-top: 10px;
    }

    .node-cookie {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4.5px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.18), inset 0 -4px 6px rgba(0, 0, 0, 0.12);
    }

    .node-locked {
      border-radius: 50%;
      background: #7b7691;
      border: 4.5px solid rgba(255, 255, 255, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }

    .go-badge {
      padding: 6px 20px;
      border-radius: 18px;
      margin-bottom: 6px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      font-family: 'Baloo 2', sans-serif;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 1.5px;
      animation: goBounce 1s ease-in-out infinite;
    }

    @keyframes goBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    @keyframes pinPop {
      0% {
        transform: scale(0.4);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .pin-outer {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3.5px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      animation: pinPop .3s ease-out;
    }

    .pin-avatar-ring {
      width: 50px;
      height: 50px;
      border-radius: 25px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.7);
      font-size: 26px;
    }

    /* Mode / color selection cards on Home screen */
    .mode-card {
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .mode-card:active {
      transform: scale(0.97);
    }

    .color-dot-btn {
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .color-dot-btn:active {
      transform: scale(0.92);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const token = localStorage.getItem("token");
    const api = axios.create({
      baseURL: apiBaseUrl + "/api",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      },
    });
    const offerId = 80;
    function getVisitorId() {
      const match = document.cookie.match(/(^| )visitorId=([^;]+)/);
      return match ? match[2] : null;
    }
    // ==================== TRANSLATIONS ====================
    async function initI18n() {
      const lang = localStorage.getItem("appLanguage") || navigator.language || "en";
      const supportedLanguages = [
        "en", "hi", "ta", "zh-TW", "de", "fr", "it", "nl", "zh", "ko",
        "ru", "ja", "es", "id", "fi", "hu", "ms", "th", "en-GB", "el",
        "bn", "ar", "cs", "uk", "sv", "pl", "ro", "sk", "tr", "vi",
        "zh-CN", "pt-BR", "mx", "da", "no", "lv", "hr"
      ];

      const language = supportedLanguages.includes(lang) ? lang : "en";
      let translations = {};
      try {
        translations = await fetch(`/locales/${language}.json`).then(res => res.json());
      } catch (e) {
        translations = {};
      }
      await i18next
        .use(i18nextBrowserLanguageDetector)
        .init({
          lng: language,
          fallbackLng: "en",
          resources: {
            [language]: {
              translation: translations,
            },
          },
          interpolation: {
            escapeValue: false,
          },
        });
    }
    initI18n();
    // Custom hook for translations
    const useTranslation = () => {
      const [t, setT] = useState(() => (key, options) => {
        return i18next.t(`Game_CrossWord.${key}`, options);
      });
      const [currentLang, setCurrentLang] = useState(i18next.language);
      useEffect(() => {
        const updateTranslation = () => {
          setT(() => (key, options) =>
            i18next.t(`Game_CrossWord.${key}`, options)
          );
          setCurrentLang(i18next.language);
        };
        i18next.on("languageChanged", updateTranslation);
        return () =>
          i18next.off("languageChanged", updateTranslation);
      }, []);
      return { t, currentLang };
    };

    const START_OFFSET = { red: 39, green: 0, yellow: 13, blue: 26 };
    const SAFE_GLOBAL = [0, 8, 13, 21, 26, 34, 39, 47];
    const ENTRY_ARROWS = {
      red: [13, 6],
      green: [6, 1],
      yellow: [1, 8],
      blue: [8, 13]
    };
    const background = {
      green: "#138808",
      yellow: "#FFD400",
      red: "#E53935",
      blue: "#1E88E5"
    };
    const SOUNDS = {
      dice: new Audio("https://cdn.freesound.org/previews/736/736744_15933495-lq.mp3"),
      move: new Audio("https://cdn.freesound.org/previews/464/464909_4284968-lq.mp3"),
      capture: new Audio("https://cdn.freesound.org/previews/855/855914_15895934-lq.mp3"),
      pass: new Audio("https://cdn.freesound.org/previews/844/844146_10594370-lq.mp3"),
      win: new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3")
    };

    let soundEnabled = true;
    function setSoundEnabled(value) {
      soundEnabled = value;
    }
    function playSound(name) {
      if (!soundEnabled) return;
      const sound = SOUNDS[name];
      if (!sound) return;
      sound.currentTime = 0;
      sound.play().catch(() => { });
    }

    const YARD_COORDS = {
      green: [[1.5, 1.5], [1.5, 3.5], [3.5, 1.5], [3.5, 3.5]],
      yellow: [[1.5, 10.5], [1.5, 12.5], [3.5, 10.5], [3.5, 12.5]],
      red: [[10.5, 1.5], [10.5, 3.5], [12.5, 1.5], [12.5, 3.5]],
      blue: [[10.5, 10.5], [10.5, 12.5], [12.5, 10.5], [12.5, 12.5]],
    };

    function buildTrackCoords() {
      const coords = new Array(52);
      const path = [
        [6, 1], [6, 2], [6, 3], [6, 4], [6, 5],
        [5, 6], [4, 6], [3, 6], [2, 6], [1, 6], [0, 6],
        [0, 7],
        [0, 8],
        [1, 8], [2, 8], [3, 8], [4, 8], [5, 8],
        [6, 9], [6, 10], [6, 11], [6, 12], [6, 13], [6, 14],
        [7, 14],
        [8, 14],
        [8, 13], [8, 12], [8, 11], [8, 10], [8, 9],
        [9, 8], [10, 8], [11, 8], [12, 8], [13, 8], [14, 8],
        [14, 7],
        [14, 6],
        [13, 6], [12, 6], [11, 6], [10, 6], [9, 6],
        [8, 5], [8, 4], [8, 3], [8, 2], [8, 1], [8, 0],
        [7, 0],
        [6, 0]
      ];
      for (let i = 0; i < 52; i++) coords[i] = path[i];
      return coords;
    }
    const TRACK_COORDS = buildTrackCoords();

    const COLOR_HEX = {
      red: { main: "#E5484D", dark: "#B7282D", soft: "#FFD9D3" },
      green: { main: "#12A454", dark: "#0B7A3E", soft: "#D3F5E0" },
      yellow: { main: "#FFC229", dark: "#DB9B0A", soft: "#FFEBBE" },
      blue: { main: "#2E7BFA", dark: "#1B57C4", soft: "#D3E9FE" },
    };

    // Component to render a colored pin(token) representing a player's token
    function ColorGlyph({ color, size = 30 }) {
      const hex = COLOR_HEX[color].main;
      return (
        <svg viewBox="0 0 100 100" width={size} height={size}>
          <path
            d="M50 8 C27 8 10 26 10 48 C10 68 35 85 50 96 C65 85 90 68 90 48 C90 26 73 8 50 8 Z"
            fill={hex}
            stroke="white"
            strokeWidth="6"
            strokeLinejoin="round"
          />
          <circle cx="50" cy="45" r="16" fill="white" opacity="0.9" />
        </svg>
      );
    }

    // List of available game modes
    const MODES = [
      { id: "1bot", label: "2 Players", players: 2, sub: "You + 1 bot", dots: 2, isBot: true },
      { id: "2bot", label: "3 Players", players: 3, sub: "You + 2 bot", dots: 3, isBot: true },
      { id: "3bot", label: "4 Players", players: 4, sub: "You + 3 bot", dots: 4, isBot: true },
    ];

    function CenterTriangle() {
      const hex = c => COLOR_HEX[c].main;
      return (
        <div style={{ gridRow: "7 / span 3", gridColumn: "7 / span 3", position: "relative", pointerEvents: "none" }}>
          <svg viewBox="0 0 100 100" width="100%" height="100%" style={{ overflow: "visible" }}>
            <g transform="translate(50,50) translate(-50,-50)">
              <polygon points="0,0 50,50 0,100" fill={hex("green")} />
              <polygon points="0,0 100,0 50,50" fill={hex("yellow")} />
              <polygon points="100,0 100,100 50,50" fill={hex("blue")} />
              <polygon points="0,100 100,100 50,50" fill={hex("red")} />
            </g>
          </svg>
        </div>
      );
    }

    function HomeYard({ color }) {
      const positions = { green: [0, 0], yellow: [0, 9], red: [9, 0], blue: [9, 9] };
      const [r0, c0] = positions[color];
      const hex = COLOR_HEX[color];
      return (
        <div style={{
          gridRow: (r0 + 1) + " / span 6",
          gridColumn: (c0 + 1) + " / span 6",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          position: "relative",
        }}>
          <div style={{
            width: "66%", height: "66%",
            background: "white",
            borderRadius: "14%",
            display: "grid",
            gridTemplateColumns: "1fr 1fr",
            gridTemplateRows: "1fr 1fr",
            gap: "12%",
            padding: "12%",
            boxShadow: "0 4px 10px rgba(0,0,0,0.18)",
          }}>
            {[0, 1, 2, 3].map(i => (
              <div key={i} style={{
                background: hex.soft,
                borderRadius: "50%",
                border: `3px solid ${hex.main}`,
              }} />
            ))}
          </div>
        </div>
      );
    }

    // Function to calculate the row and column coordinates of a token based on its color, position on the track, and index within its home yard or home column
    function tokenCoord(color, pos, tokenIdx) {
      if (pos === -1) {
        const [r, c] = YARD_COORDS[color][tokenIdx];
        return { row: r, col: c };
      }
      if (pos === 56) {
        const [r, c] = CENTER_CELLS[color]
        return { row: r, col: c };
      }
      if (pos >= 51) { // home column, pos 51..55 -> index 0..5 ; pos 56 = finished(center)
        const hc = HOME_COLS[color];
        const idx = pos - 51;
        const [r, c] = hc[idx];
        return { row: r, col: c };
      }
      const globalIdx = (START_OFFSET[color] + pos) % 52;
      const [r, c] = TRACK_COORDS[globalIdx];
      return { row: r, col: c };
    }

    // Component to render a player's token on the board, positioned based on its color, index, and position in the game. It also handles click events for movable tokens.
    function Token({ color, tokenIdx, pos, stackCount = 1, stackOffset = 0, movable, onClick }) {
      const { row, col } = tokenCoord(color, pos, tokenIdx);
      const STACK_OFFSETS = {
        1: [
          { x: 0, y: 0 }
        ],
        2: [
          { x: -5, y: 0 },
          { x: 5, y: 0 }
        ],
        3: [
          { x: -5, y: -4 },
          { x: 5, y: -4 },
          { x: 0, y: 5 }
        ],
        4: [
          { x: -5, y: -5 },
          { x: 5, y: -5 },
          { x: -5, y: 5 },
          { x: 5, y: 5 }
        ]
      };

      const offset = STACK_OFFSETS[Math.min(stackCount, 4)][stackOffset];
      const dx = offset.x;
      const dy = offset.y;
      let tokenSize = 6.4;
      switch (stackCount) {
        case 2:
          tokenSize = 4.8;
          break;
        case 3:
          tokenSize = 4.4;
          break;
        case 4:
          tokenSize = 4.0;
          break;
        default:
          tokenSize = 6.4;
      }
      const halfToken = tokenSize / 2;
      const cellSize = 100 / 15;
      const jitter = stackCount > 1 ? (stackOffset * 6 - (stackCount - 1) * 3) : 0;
      const style = {
        position: "absolute",
        left: `calc(${col * cellSize}% + ${cellSize * 0.5}% - ${halfToken}% + ${jitter}% + ${dx}px)`,
        top: `calc(${row * cellSize}% + ${cellSize * 0.5}% - ${halfToken}% + ${dy}px)`,
        width: `${tokenSize}%`,
        height: `${tokenSize}%`,
        background: COLOR_HEX[color].main,
      };
      return (
        <div
          className={"token" + (movable ? " movable" : "")}
          style={style}
          onClick={movable ? onClick : undefined}
        >
          <div className="token-dot" />
          {stackCount > 1 && stackOffset === 0 && <div className="token-stack-count">{stackCount}</div>}
        </div>
      );
    }

    function StarIcon() {
      return (
        <svg viewBox="0 0 24 24" width="62%" height="62%" style={{ opacity: 0.85 }}>
          <polygon
            points="12,1.5 15.1,8.6 22.8,9.3 17,14.5 18.7,22.2 12,18.2 5.3,22.2 7,14.5 1.2,9.3 8.9,8.6"
            fill="rgba(255,255,255,0.55)"
            stroke="rgba(255,255,255,0.95)"
            strokeWidth="1.1"
          />
        </svg>
      );
    }

    const PIP_LAYOUTS = {
      1: [[50, 50]],
      2: [[25, 25], [75, 75]],
      3: [[25, 25], [50, 50], [75, 75]],
      4: [[25, 25], [75, 25], [25, 75], [75, 75]],
      5: [[25, 25], [75, 25], [50, 50], [25, 75], [75, 75]],
      6: [[25, 25], [75, 25], [25, 50], [75, 50], [25, 75], [75, 75]],
    };

    function DiceFace({ value }) {
      return (
        <svg viewBox="0 0 100 100" width="42" height="42">
          {PIP_LAYOUTS[value].map(([cx, cy], i) => (
            <circle key={i} cx={cx} cy={cy} r="9" fill="#2B2620" />
          ))}
        </svg>
      );
    }

    // Verified via rotation-matrix math: to bring a face to the viewer, rotate the cube
    // by the inverse of that face's own placement rotation.
    const FACE_ROTATION = {
      1: { x: 0, y: 0 },
      6: { x: 0, y: -180 },
      2: { x: 0, y: -90 },
      5: { x: 0, y: 90 },
      3: { x: -90, y: 0 },
      4: { x: 90, y: 0 },
    };

    function DiceCube({ value, rollId }) {
      const spinRef = useRef(0);
      const computeTransform = (v) => {
        spinRef.current += 2;
        const target = FACE_ROTATION[v];
        const x = target.x + spinRef.current * 360;
        const y = target.y + spinRef.current * 360;
        return `rotateX(${x}deg) rotateY(${y}deg)`;
      };
      const [transform, setTransform] = useState(() => computeTransform(value));
      useEffect(() => {
        setTransform(computeTransform(value));
      }, [rollId]);

      return (
        <div
          className="dice-cube"
          style={{
            transform,
            transition: "transform 0.7s cubic-bezier(.34,1.56,.64,1)",
          }}
        >
          <div className="dice-face front">  <DiceFace value={1} /> </div>
          <div className="dice-face back">   <DiceFace value={6} /> </div>
          <div className="dice-face right">  <DiceFace value={2} /> </div>
          <div className="dice-face left">   <DiceFace value={5} /> </div>
          <div className="dice-face top">    <DiceFace value={3} /> </div>
          <div className="dice-face bottom"> <DiceFace value={4} /> </div>
        </div>
      );
    }

    function Dice({ value, rollId, isRolling, onRoll }) {
      return (
        <div className="dice-wrap">
          <div className={"dice3d" + (isRolling ? " rolling" : " can-roll")} onClick={onRoll}>
            <DiceCube value={value} rollId={rollId} />
          </div>
        </div>
      );
    }

    const CELL_TYPES = {
      EMPTY: "empty",
      PATH: "path",
      YARD: "yard",
      SAFE: "safe",
      HOME: "home",
      CENTER: "center"
    };

    function getCellBackground(cell) {
      switch (cell.type) {
        case CELL_TYPES.YARD:
          return COLOR_HEX[cell.color].main;
        case CELL_TYPES.PATH:
          return cell.color ? COLOR_HEX[cell.color].main : "#ffffff";
        case CELL_TYPES.HOME:
          return COLOR_HEX[cell.color].main;
        case CELL_TYPES.CENTER:
          return "#ffffff";
        default:
          return "#ffffff";
      }
    }

    function Cell({ board }) {
      return (
        <>
          {board.map((row) =>
            row.map((cell) => {
              const background = getCellBackground(cell);
              return (
                <div
                  key={`${cell.row}-${cell.col}`}
                  className={"cell" + (cell.safe ? " safe" : "")}
                  style={{
                    gridRow: cell.row + 1,
                    gridColumn: cell.col + 1,
                    background: background,
                    border: cell.type === CELL_TYPES.PATH ? "1px solid #999" : cell.type === CELL_TYPES.YARD ? "none" : "1px solid #d9d9d9"
                  }}
                />
              );
            })
          )}
        </>
      );
    }

    function setCell(board, row, col, data) {
      Object.assign(board[row][col], data);
    }
    function fillRect(board, startRow, startCol, rows, cols, data) {
      for (let r = startRow; r < startRow + rows; r++) {
        for (let c = startCol; c < startCol + cols; c++) {
          setCell(board, r, c, data);
        }
      }
    }

    function buildHomeCols() {
      const cols = { green: [], yellow: [], blue: [], red: [] };
      for (let c = 1; c <= 5; c++) cols.green.push([7, c]);
      for (let r = 1; r <= 5; r++) cols.yellow.push([r, 7]);
      for (let c = 13; c >= 9; c--) cols.blue.push([7, c]);
      for (let r = 13; r >= 9; r--) cols.red.push([r, 7]);
      return cols;
    }
    const HOME_COLS = buildHomeCols();

    function buildCenterCoords() {
      const coords = [];
      for (let r = 6; r <= 8; r++) {
        for (let c = 6; c <= 8; c++) {
          coords.push([r, c]);
        }
      }
      return coords;
    }
    const CENTER_COORDS = buildCenterCoords();

    const CENTER_CELLS = {
      yellow: [6.3, 7],
      green: [7, 6.3],
      blue: [7, 7.7],
      red: [7.7, 7],
    };

    const BOARD_SIZE = 15;
    function createBoard() {
      const board = [];
      for (let row = 0; row < BOARD_SIZE; row++) {
        const currentRow = [];
        for (let col = 0; col < BOARD_SIZE; col++) {
          currentRow.push({
            row,
            col,
            type: CELL_TYPES.EMPTY,
            color: null,
            safe: false,
            arrow: null
          });

        }
        board.push(currentRow);
      }
      // Paint the four home yards in their respective corners
      fillRect(board, 0, 0, 6, 6, {
        type: CELL_TYPES.YARD,
        color: "green"
      });
      fillRect(board, 0, 9, 6, 6, {
        type: CELL_TYPES.YARD,
        color: "yellow"
      });
      fillRect(board, 9, 0, 6, 6, {
        type: CELL_TYPES.YARD,
        color: "red"
      });
      fillRect(board, 9, 9, 6, 6, {
        type: CELL_TYPES.YARD,
        color: "blue"
      });
      TRACK_COORDS.forEach(([row, col]) => {
        setCell(board, row, col, {
          type: CELL_TYPES.PATH
        });
      });
      // Paint home columns and entry cells — the 6 squares leading to the center for each color
      Object.keys(HOME_COLS).forEach((color) => {
        HOME_COLS[color].forEach(([row, col]) => {
          setCell(board, row, col, { type: CELL_TYPES.HOME, color });
        });
      });
      // Paint safe cells — positions on the global track where tokens can't be captured
      SAFE_GLOBAL.forEach((globalIdx) => {
        const [row, col] = TRACK_COORDS[globalIdx];
        setCell(board, row, col, {
          safe: true
        });
      });

      // Paint entry arrows — the track cell just before each color's home column,
      Object.keys(ENTRY_ARROWS).forEach((color) => {
        const [row, col] = ENTRY_ARROWS[color];
        setCell(board, row, col, { color });
      });

      // Paint center — the 3x3 block where all tokens finish
      CENTER_COORDS.forEach(([row, col]) => {
        setCell(board, row, col, {
          type: CELL_TYPES.CENTER
        });
      });

      return board;
    }

    function createInitialTokens(activeColors) {
      const tokens = [];
      activeColors.forEach(color => {
        for (let i = 0; i < 4; i++) {
          tokens.push({ id: color + "-" + i, color, tokenIdx: i, pos: -1 });
        }
      });
      return tokens;
    }

    function getMovableTokenIds(tokens, color, dice) {
      const movable = [];
      tokens.forEach(t => {
        if (t.color !== color) return;
        if (t.pos === -1) {
          if (dice === 6) movable.push(t.id); // needs a 6 to leave yard
          return;
        }
        if (t.pos === 56) return; // already finished
        const newPos = t.pos + dice;
        if (newPos <= 56) movable.push(t.id); // can't overshoot past home
      });
      return movable;
    }

    function applyCapture(tokens, movedToken) {
      if (movedToken.pos < 0 || movedToken.pos > 50) return { tokens, captured: false };
      const globalIdx = (START_OFFSET[movedToken.color] + movedToken.pos) % 52;
      const isSafe = SAFE_GLOBAL.includes(globalIdx);
      if (isSafe) return { tokens, captured: false };
      let captured = false;
      const result = tokens.map(t => {
        if (t.color === movedToken.color) return t;
        if (t.pos < 0 || t.pos > 50) return t;
        const rivalGlobalIdx = (START_OFFSET[t.color] + t.pos) % 52;
        if (rivalGlobalIdx === globalIdx) {
          captured = true;
          return { ...t, pos: -1 };
        }
        return t;
      });
      return { tokens: result, captured };
    }

    function isColorFinished(tokens, color) {
      return tokens.filter(t => t.color === color).every(t => t.pos === 56);
    }

    function Board({ tokens, movableTokenIds, onTokenClick }) {
      const board = useMemo(() => createBoard(), []);
      const tokenGroups = useMemo(() => {
        const groups = {};
        tokens.forEach(token => {
          const { row, col } = tokenCoord(
            token.color,
            token.pos,
            token.tokenIdx
          );
          const key = `${row}-${col}`;
          if (!groups[key]) {
            groups[key] = [];
          }
          groups[key].push(token);
        });
        return groups;
      }, [tokens]);

      return (
        <div className="board">
          <Cell board={board} />
          <HomeYard color="green" />
          <HomeYard color="yellow" />
          <HomeYard color="red" />
          <HomeYard color="blue" />
          <CenterTriangle />
          {Object.values(tokenGroups).flatMap(group =>
            group.map((token, index) => (
              <Token
                key={token.id}
                color={token.color}
                tokenIdx={token.tokenIdx}
                pos={token.pos}
                stackCount={group.length}
                stackOffset={index}
                movable={movableTokenIds.includes(token.id)}
                onClick={() => onTokenClick(token.id)}
              />
            ))
          )}
        </div>
      );
    }

    function PlayerPanel({ player, isCurrent, diceState, onRoll }) {
      return (
        <div
          className={`flex items-center gap-1.5 bg-white/95 backdrop-blur px-2 py-1.5 rounded-xl shadow-lg min-w-[112px] transition-all duration-200 border ${isCurrent ? "ring-2 border-transparent scale-105" : "border-black/5"}`}
          style={{
            "--tw-ring-color": COLOR_HEX[player.color].main
          }}
        >
          <div
            className="w-8 h-8 rounded-full flex items-center justify-center shrink-0"
            style={{ background: COLOR_HEX[player.color].soft }}
          >
            <ColorGlyph
              color={player.color}
              size={26}
            />
          </div>
          <div className="flex flex-col leading-tight">
            <div className="font-bold text-sm text-[#2B2620]">
              {player.name}
            </div>
            <div className="text-[10px] font-semibold" style={{ color: isCurrent ? COLOR_HEX[player.color].dark : "#9a9186" }}>
              {isCurrent ? "Turn" : "\u00A0"}
            </div>
          </div>
          <Dice
            value={diceState[player.color].value}
            rollId={diceState[player.color].rollId}
            isRolling={diceState[player.color].rolling}
            onRoll={isCurrent ? onRoll : undefined}
          />
        </div>
      );
    }

    /* ═══════════════════════ BOT DIFFICULTY LOGIC ═══════════════════════
       Every level function receives (tokens, color, dice) and returns the
       id of the token to move (or null if no legal move exists). Each
       tier adds one more layer of strategic awareness on top of the last,
       forming a clean difficulty ladder from "random" to "near-perfect".
    */

    // Helper: build a rich descriptor for every legal move this turn.
    function describeMoves(tokens, color, dice) {
      const movableIds = getMovableTokenIds(tokens, color, dice);
      return movableIds.map(id => {
        const t = tokens.find(tok => tok.id === id);
        const newPos = t.pos === -1 ? 0 : t.pos + dice;
        let globalIdx = null;
        let isSafeSquare = false;
        let capturesRival = false;
        let entersHomeColumn = false;
        let finishesToken = false;
        let leavesYard = t.pos === -1;

        if (newPos <= 50) {
          globalIdx = (START_OFFSET[color] + newPos) % 52;
          isSafeSquare = SAFE_GLOBAL.includes(globalIdx);
          capturesRival = tokens.some(rival =>
            rival.color !== color &&
            rival.pos >= 0 && rival.pos <= 50 &&
            (START_OFFSET[rival.color] + rival.pos) % 52 === globalIdx
          );
        } else if (newPos < 56) {
          entersHomeColumn = true;
        } else if (newPos === 56) {
          finishesToken = true;
        }

        // Is the token currently sitting in immediate danger (a rival
        // within 1-6 steps behind it, on the open track, unprotected)?
        let inDanger = false;
        if (t.pos >= 0 && t.pos <= 50) {
          const myGlobal = (START_OFFSET[color] + t.pos) % 52;
          if (!SAFE_GLOBAL.includes(myGlobal)) {
            inDanger = tokens.some(rival => {
              if (rival.color === color) return false;
              if (rival.pos < 0 || rival.pos > 50) return false;
              const rivalGlobal = (START_OFFSET[rival.color] + rival.pos) % 52;
              for (let step = 1; step <= 6; step++) {
                if ((rivalGlobal + step) % 52 === myGlobal) return true;
              }
              return false;
            });
          }
        }

        return { id, token: t, newPos, isSafeSquare, capturesRival, entersHomeColumn, finishesToken, leavesYard, inDanger };
      });
    }

    function pickRandom(moves) {
      return moves[Math.floor(Math.random() * moves.length)].id;
    }

    // WARM UP: pure chance — a brand-new player fumbling the dice.
    function warmUpMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;
      return pickRandom(moves);
    }

    // BEGINNER: mostly random, but takes a free capture when it falls
    // straight into its lap.
    function beginnerMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;
      const capture = moves.find(m => m.capturesRival);
      if (capture && Math.random() < 0.6) return capture.id;
      return pickRandom(moves);
    }

    // EASY: always takes captures and finishes, otherwise random.
    function easyMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;
      const capture = moves.find(m => m.capturesRival);
      if (capture) return capture.id;
      const finish = moves.find(m => m.finishesToken);
      if (finish) return finish.id;
      return pickRandom(moves);
    }

    // MEDIUM: captures > finishing > escaping danger > leaving the yard,
    // else moves the furthest-advanced token.
    function mediumMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;

      const capture = moves.find(m => m.capturesRival);
      if (capture) return capture.id;

      const finish = moves.find(m => m.finishesToken);
      if (finish) return finish.id;

      const escape = moves.find(m => m.inDanger);
      if (escape) return escape.id;

      const leave = moves.find(m => m.leavesYard);
      if (leave && dice === 6) return leave.id;

      const sorted = [...moves].sort((a, b) => b.token.pos - a.token.pos);
      return sorted[0].id;
    }

    // HARD: adds preference for safe squares and home-column entry,
    // and avoids moving INTO danger when a safer option exists.
    function hardMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;

      const capture = moves.find(m => m.capturesRival);
      if (capture) return capture.id;

      const finish = moves.find(m => m.finishesToken);
      if (finish) return finish.id;

      const escape = moves.find(m => m.inDanger);
      if (escape) return escape.id;

      const safeMove = moves.find(m => m.isSafeSquare && !m.leavesYard);
      const homeEntry = moves.find(m => m.entersHomeColumn);
      if (homeEntry) return homeEntry.id;
      if (safeMove) return safeMove.id;

      const leave = moves.find(m => m.leavesYard);
      if (leave && dice === 6) return leave.id;

      // Avoid moves that would land in a rival's strike zone if another
      // option doesn't.
      const willBeSafeFromChase = moves.filter(m => !wouldBeInDanger(tokens, color, m.newPos));
      const pool = willBeSafeFromChase.length > 0 ? willBeSafeFromChase : moves;
      const sorted = [...pool].sort((a, b) => b.token.pos - a.token.pos);
      return sorted[0].id;
    }

    function wouldBeInDanger(tokens, color, newPos) {
      if (newPos < 0 || newPos > 50) return false;
      const myGlobal = (START_OFFSET[color] + newPos) % 52;
      if (SAFE_GLOBAL.includes(myGlobal)) return false;
      return tokens.some(rival => {
        if (rival.color === color) return false;
        if (rival.pos < 0 || rival.pos > 50) return false;
        const rivalGlobal = (START_OFFSET[rival.color] + rival.pos) % 52;
        for (let step = 1; step <= 6; step++) {
          if ((rivalGlobal + step) % 52 === myGlobal) return true;
        }
        return false;
      });
    }

    // EXPERT: hard's rules, but prioritizes bringing new tokens out
    // earlier and values capturing more tokens further from home (bigger
    // tempo swing) over the single furthest-advanced heuristic.
    function expertMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;

      const captures = moves.filter(m => m.capturesRival);
      if (captures.length > 0) {
        // Prefer capturing the rival token that has traveled the
        // furthest (biggest loss for them).
        const rivalProgress = (m) => {
          const globalIdx = (START_OFFSET[color] + m.newPos) % 52;
          const rival = tokens.find(r => r.color !== color && r.pos >= 0 && r.pos <= 50 &&
            (START_OFFSET[r.color] + r.pos) % 52 === globalIdx);
          return rival ? rival.pos : 0;
        };
        captures.sort((a, b) => rivalProgress(b) - rivalProgress(a));
        return captures[0].id;
      }

      const finish = moves.find(m => m.finishesToken);
      if (finish) return finish.id;

      const escape = moves.find(m => m.inDanger);
      if (escape) return escape.id;

      const leave = moves.find(m => m.leavesYard);
      const tokensOnBoard = tokens.filter(t => t.color === color && t.pos >= 0 && t.pos <= 50).length;
      if (leave && dice === 6 && tokensOnBoard < 2) return leave.id;

      const homeEntry = moves.find(m => m.entersHomeColumn);
      if (homeEntry) return homeEntry.id;

      const safeMove = moves.find(m => m.isSafeSquare && !m.leavesYard);
      if (safeMove) return safeMove.id;

      const willBeSafeFromChase = moves.filter(m => !wouldBeInDanger(tokens, color, m.newPos) && !m.leavesYard);
      const pool = willBeSafeFromChase.length > 0 ? willBeSafeFromChase : moves;
      const sorted = [...pool].sort((a, b) => b.token.pos - a.token.pos);
      return sorted[0].id;
    }

    // MASTER: expert's judgement, plus it looks one ply further — it
    // will not walk a token into a square from which it can be captured
    // even by chaining two rival dice possibilities isn't needed here
    // (single-die game), but it does avoid clustering tokens unsafely
    // and holds back the last yard token if the board is already risky.
    function masterMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;

      const captures = moves.filter(m => m.capturesRival);
      if (captures.length > 0) {
        const rivalProgress = (m) => {
          const globalIdx = (START_OFFSET[color] + m.newPos) % 52;
          const rival = tokens.find(r => r.color !== color && r.pos >= 0 && r.pos <= 50 &&
            (START_OFFSET[r.color] + r.pos) % 52 === globalIdx);
          return rival ? rival.pos : 0;
        };
        // Skip a capture only if it would immediately land us back
        // in danger AND a non-capturing safe move exists instead.
        captures.sort((a, b) => rivalProgress(b) - rivalProgress(a));
        const safestCapture = captures.find(m => !wouldBeInDanger(tokens, color, m.newPos)) || captures[0];
        return safestCapture.id;
      }

      const finish = moves.find(m => m.finishesToken);
      if (finish) return finish.id;

      const escape = moves.find(m => m.inDanger && !wouldBeInDanger(tokens, color, m.newPos));
      if (escape) return escape.id;
      const anyEscape = moves.find(m => m.inDanger);
      if (anyEscape) return anyEscape.id;

      const homeEntry = moves.find(m => m.entersHomeColumn);
      if (homeEntry) return homeEntry.id;

      const leave = moves.find(m => m.leavesYard);
      const tokensOnBoard = tokens.filter(t => t.color === color && t.pos >= 0 && t.pos <= 50).length;
      if (leave && dice === 6 && tokensOnBoard < 3) return leave.id;

      const safeAdvance = moves.filter(m => !m.leavesYard && !wouldBeInDanger(tokens, color, m.newPos));
      const candidatePool = safeAdvance.length > 0 ? safeAdvance : moves.filter(m => !m.leavesYard);
      const pool = candidatePool.length > 0 ? candidatePool : moves;
      const sorted = [...pool].sort((a, b) => b.token.pos - a.token.pos);
      return sorted[0].id;
    }

    // LEGEND: near-perfect play — master's evaluation, tie-broken by
    // whichever move maximizes total board safety across all of the
    // bot's tokens (a lightweight 1-ply lookahead across candidates).
    function LegendMove(tokens, color, dice) {
      const moves = describeMoves(tokens, color, dice);
      if (moves.length === 0) return null;
      if (moves.length === 1) return moves[0].id;

      function scoreMove(m) {
        let score = 0;
        if (m.capturesRival) {
          const globalIdx = (START_OFFSET[color] + m.newPos) % 52;
          const rival = tokens.find(r => r.color !== color && r.pos >= 0 && r.pos <= 50 &&
            (START_OFFSET[r.color] + r.pos) % 52 === globalIdx);
          score += 100 + (rival ? rival.pos : 0);
        }
        if (m.finishesToken) score += 90;
        if (m.entersHomeColumn) score += 40;
        if (m.inDanger) score += 35; // resolving current danger is valuable
        if (m.isSafeSquare) score += 20;
        if (wouldBeInDanger(tokens, color, m.newPos)) score -= 60;
        if (m.leavesYard) score += (dice === 6 ? 15 : 0);
        score += m.token.pos * 0.5; // mild preference for advancing further tokens
        return score;
      }

      const scored = moves.map(m => ({ m, s: scoreMove(m) }));
      scored.sort((a, b) => b.s - a.s);
      return scored[0].m.id;
    }

    const BOT_LEVELS = {
      WARM_UP: "warm_up",
      BEGINNER: "beginner",
      EASY: "easy",
      MEDIUM: "medium",
      HARD: "hard",
      EXPERT: "expert",
      MASTER: "master",
      LEGEND: "legend"
    };

    // Ladder used to derive a difficulty from a numeric level (1-50),
    // used by the map screen's level progression.
    const DIFFICULTY_LADDER = [
      BOT_LEVELS.WARM_UP, BOT_LEVELS.BEGINNER, BOT_LEVELS.EASY, BOT_LEVELS.MEDIUM,
      BOT_LEVELS.HARD, BOT_LEVELS.EXPERT, BOT_LEVELS.MASTER, BOT_LEVELS.LEGEND
    ];
    function difficultyForLevel(lvl) {
      const bandSize = Math.ceil(TOTAL_LEVELS_CONST / DIFFICULTY_LADDER.length);
      const idx = Math.min(DIFFICULTY_LADDER.length - 1, Math.floor((lvl - 1) / bandSize));
      return DIFFICULTY_LADDER[idx];
    }
    const TOTAL_LEVELS_CONST = 50;

    function chooseBotMove(tokens, color, dice, difficulty) {
      switch (difficulty) {
        case BOT_LEVELS.WARM_UP:
          return warmUpMove(tokens, color, dice);
        case BOT_LEVELS.BEGINNER:
          return beginnerMove(tokens, color, dice);
        case BOT_LEVELS.EASY:
          return easyMove(tokens, color, dice);
        case BOT_LEVELS.MEDIUM:
          return mediumMove(tokens, color, dice);
        case BOT_LEVELS.HARD:
          return hardMove(tokens, color, dice);
        case BOT_LEVELS.EXPERT:
          return expertMove(tokens, color, dice);
        case BOT_LEVELS.MASTER:
          return masterMove(tokens, color, dice);
        case BOT_LEVELS.LEGEND:
          return LegendMove(tokens, color, dice);
        default:
          return mediumMove(tokens, color, dice);
      }
    }

    function GameScreen({ setScreen, players, level }) {
      const ACTIVE_COLORS = players.map(p => p.color);
      const [tokens, setTokens] = useState(() => createInitialTokens(ACTIVE_COLORS));
      const [currentTurnIdx, setCurrentTurnIdx] = useState(0);
      const [hasRolled, setHasRolled] = useState(false);
      const currentColor = ACTIVE_COLORS[currentTurnIdx];
      const [diceState, setDiceState] = useState(
        ACTIVE_COLORS.reduce((obj, color) => {
          obj[color] = {
            value: 1,
            rolling: false,
            rollId: 0
          };
          return obj;
        }, {})
      );
      const [winner, setWinner] = useState(null);
      const [movingToken, setMovingToken] = useState(null);
      const [sixCount, setSixCount] = useState(0);
      const [soundOn, setSoundOn] = useState(true);

      const toggleSound = () => {
        const next = !soundOn;
        setSoundOn(next);
        setSoundEnabled(next);
      };

      function getMovePath(token, steps) {
        const path = [];
        let current = token.pos;
        if (current === -1) {
          path.push(0);
          return path;
        }
        for (let i = 1; i <= steps; i++) {
          current++;
          if (current > 56) {
            break;
          }
          path.push(current);
        }
        return path;
      }

      function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }
      async function moveToken(tokenId, path) {
        for (const position of path) {
          await delay(300);
          setTokens(prev =>
            prev.map(t => {
              if (t.id !== tokenId)
                return t;
              return {
                ...t,
                pos: position
              };
            })
          );
          playSound("move");
          if (position === 56) playSound("pass");
        }
      }

      const onExit = () => {
        setScreen("home");
      };

      const handleRoll = () => {
        if (diceState[currentColor].rolling || hasRolled || movingToken) return;
        setDiceState(prev => ({
          ...prev,
          [currentColor]: { ...prev[currentColor], rolling: true }
        }));
        setTimeout(() => {
          const roll = Math.floor(Math.random() * 6) + 1;
          setDiceState(prev => ({
            ...prev,
            [currentColor]: { value: roll, rolling: false, rollId: prev[currentColor].rollId + 1 }
          }));
          playSound("dice");
          let newSixCount = sixCount;
          roll === 6 ? newSixCount++ : newSixCount = 0;
          if (newSixCount === 3) {
            setSixCount(0);
            setCurrentTurnIdx(
              prev => (prev + 1) % ACTIVE_COLORS.length
            );
            setHasRolled(false);
            return;
          }
          setSixCount(newSixCount);
          const movable = getMovableTokenIds(tokens, currentColor, roll);
          if (movable.length === 0) {
            if (roll !== 6) {
              setSixCount(0);
              setCurrentTurnIdx(prev => (prev + 1) % ACTIVE_COLORS.length);
            }
            setHasRolled(false);
          } else {
            setHasRolled(true);
          }
        }, 550);
      };

      const handleTokenClick = async (tokenId) => {
        if (movingToken) return;
        const token = tokens.find(t => t.id === tokenId);
        if (!token) return;
        setMovingToken(tokenId);
        const path = getMovePath(token, token.pos === -1 ? 1 : diceState[currentColor].value);
        await moveToken(tokenId, path);
        setTokens(prev => {
          const movedToken = prev.find(t => t.id === tokenId);
          const { tokens: result, captured } = applyCapture(prev, movedToken);
          if (captured) playSound("capture");
          if (isColorFinished(result, movedToken.color)) {
            setWinner(movedToken.color);
            playSound("win");
          }
          return result;
        });
        setMovingToken(null);
        setHasRolled(false);
        if (diceState[currentColor].value !== 6) {
          setCurrentTurnIdx(
            prev => (prev + 1) % ACTIVE_COLORS.length
          );
        }
      };

      useEffect(() => {
        const player = players.find(p => p.color === currentColor);
        if (!player?.isBot || winner) return;
        if (!hasRolled && !diceState[currentColor].rolling && !movingToken) {
          const timer = setTimeout(() => {
            handleRoll();
          }, 700);
          return () => clearTimeout(timer);
        }
      }, [currentColor, hasRolled, diceState, movingToken, winner]);

      useEffect(() => {
        const player = players.find(p => p.color === currentColor);
        if (!player?.isBot || winner) return;
        if (hasRolled && !movingToken) {
          const timer = setTimeout(() => {
            const tokenId = chooseBotMove(tokens, currentColor, diceState[currentColor].value, player.difficulty);
            if (tokenId) handleTokenClick(tokenId);
            else {
              // no legal move for the bot — pass the turn
              setHasRolled(false);
              setCurrentTurnIdx(prev => (prev + 1) % ACTIVE_COLORS.length);
            }
          }, 700);
          return () => clearTimeout(timer);
        }
      }, [hasRolled, currentColor, movingToken, winner]);

      return (
        <div className="game flex flex-col items-center gap-4 px-3 pt-4 pb-10">
          {winner && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(10,4,30,0.65)", backdropFilter: "blur(2px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
              <div className="winner-card">
                <div className="text-4xl mb-2">🏆</div>
                <h2 style={{ color: COLOR_HEX[winner].dark, fontFamily: "'Baloo 2', sans-serif", fontSize: "26px", fontWeight: 800, marginBottom: "8px" }}>
                  {winner.charAt(0).toUpperCase() + winner.slice(1)} Wins!
                </h2>
                <p className="text-[#6b6459] text-sm mb-5">All four tokens made it home.</p>
                <button className="start-btn" onClick={onExit}>Back to Menu</button>
              </div>
            </div>
          )}

          <div className="flex items-center justify-between w-full max-w-[460px]">
            <button
              className="bg-white/10 text-[#FBF7EE] border border-white/20 rounded-[10px] py-2 px-3.5 text-[13px] font-semibold hover:bg-white/20 transition"
              onClick={onExit}
            >
              ← Menu
            </button>
            <span className="text-[#FBF7EE] font-['Baloo_2'] text-xl font-bold tracking-wide">Ludo Rex</span>
            <button
              onClick={toggleSound}
              className="bg-white/10 text-[#FBF7EE] border border-white/20 rounded-[10px] w-9 h-9 flex items-center justify-center text-[15px] hover:bg-white/20 transition"
            >
              {soundOn ? "🔊" : "🔇"}
            </button>
          </div>

          {/* top row bot panels */}
          <div className="flex justify-center gap-2 flex-wrap w-full max-w-[460px]">
            {players.filter(p => p.color === "green" || p.color === "yellow").map(p => (
              <PlayerPanel key={p.color} player={p} isCurrent={currentColor === p.color} diceState={diceState} onRoll={handleRoll} />
            ))}
          </div>

          <div className="board-shell">
            <div className="board-shell-inner">
              <Board
                tokens={tokens}
                movableTokenIds={movingToken ? [] : hasRolled ? getMovableTokenIds(tokens, currentColor, diceState[currentColor].value) : []}
                onTokenClick={handleTokenClick}
              />
            </div>
          </div>

          {/* bottom row bot/human panels */}
          <div className="flex justify-center gap-2 flex-wrap w-full max-w-[460px]">
            {players.filter(p => p.color === "red" || p.color === "blue").map(p => (
              <PlayerPanel key={p.color} player={p} isCurrent={currentColor === p.color} diceState={diceState} onRoll={handleRoll} />
            ))}
          </div>
        </div>
      );
    }

    /* ═══════════════════════ CANDY-CRUSH STYLE LEVEL MAP ═══════════════════════ */

    const TOTAL_LEVELS = 50;
    const NODE_R = 30;
    const V_GAP = 92;
    const TOP_PAD = 50;
    const BOT_PAD = 140;
    const MAP_W = 420;
    const MAP_H = TOP_PAD + (TOTAL_LEVELS - 1) * V_GAP + NODE_R + BOT_PAD;

    const SX = [0.50, 0.30, 0.20, 0.30, 0.50, 0.70, 0.80, 0.70];
    const nx = (i) => SX[i % SX.length] * MAP_W;
    const ny = (i) => TOP_PAD + (TOTAL_LEVELS - 1 - i) * V_GAP + NODE_R;

    // Rotating band palette, now built directly from the four ludo
    // colors (red / yellow / green / blue cycle) so the whole map reads
    // as one coherent Ludo-themed identity instead of an unrelated
    // 10-color rainbow.
    const BAND_COLORS = [
      { sky: ["#170B2E", "#4a1620"], accent: "#E5484D" },   // red band
      { sky: ["#170B2E", "#4a3a14"], accent: "#FFC229" },   // yellow band
      { sky: ["#170B2E", "#0f3f24"], accent: "#12A454" },   // green band
      { sky: ["#170B2E", "#173a63"], accent: "#2E7BFA" },   // blue band
    ];
    const BAND_SIZE = 5;
    const getBand = (levelIndex) => BAND_COLORS[Math.floor(levelIndex / BAND_SIZE) % BAND_COLORS.length];

    const DECOR = ['🎲', '⭐', '🎯', '🏁', '🎲', '⭐', '🎯', '🏁', '🎲', '⭐'];

    function buildMapGradient() {
      const bandPx = BAND_SIZE * V_GAP;
      const totalBands = Math.ceil(TOTAL_LEVELS / BAND_SIZE) + 1;
      const stops = [];
      for (let b = totalBands - 1; b >= 0; b--) {
        const bottomPx = MAP_H - BOT_PAD / 2 - b * bandPx;
        const topPx = bottomPx - bandPx;
        const band = BAND_COLORS[b % BAND_COLORS.length];
        const pct1 = Math.max(0, Math.min(100, (topPx / MAP_H) * 100));
        const pct2 = Math.max(0, Math.min(100, (bottomPx / MAP_H) * 100));
        stops.push(`${band.sky[0]} ${pct1}%`, `${band.sky[1]} ${pct2}%`);
      }
      return `linear-gradient(to bottom, ${stops.join(", ")})`;
    }

    function CandyPath({ x1, y1, x2, y2, color }) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      return (
        <div style={{
          position: "absolute", left: x1, top: y1 - 5, width: len, height: 10, borderRadius: 5,
          background: `repeating-linear-gradient(90deg, ${color} 0px, ${color} 10px, rgba(255,255,255,0.55) 10px, rgba(255,255,255,0.55) 16px)`,
          transform: `rotate(${ang}deg)`, transformOrigin: "0 50%", opacity: 0.85,
          boxShadow: "0 3px 5px rgba(0,0,0,0.25)"
        }} />
      );
    }

    function LevelNode({ lvl, cx, cy, status, stars, accent, onPress }) {
      if (status === "current") {
        return (
          <div style={{ position: "absolute", left: cx - NODE_R - 20, top: cy - NODE_R - 54, display: "flex", flexDirection: "column", alignItems: "center", zIndex: 50 }}>
            <div className="go-badge" style={{ background: accent }}>GO!</div>
            <div className="pin-outer" style={{ width: 60, height: 60, background: accent, boxShadow: `0 10px 20px ${accent}66` }} onClick={onPress}>
              <div className="pin-avatar-ring">🎲</div>
            </div>
          </div>
        );
      }
      if (status === "completed") {
        return (
          <div style={{ position: "absolute", left: cx - NODE_R, top: cy - NODE_R, zIndex: 10, cursor: "pointer" }} onClick={onPress}>
            <div className="node-cookie" style={{ width: NODE_R * 2, height: NODE_R * 2, background: accent }}>
              <span style={{ fontFamily: "'Baloo 2', sans-serif", color: "#fff", fontWeight: 900, fontSize: 15 }}>{lvl}</span>
            </div>
            <div style={{ position: "absolute", bottom: -12, left: "50%", transform: "translateX(-50%)", display: "flex", gap: 2 }}>
              {[1, 2, 3].map(k => <span key={k} style={{ fontSize: 9, opacity: k <= stars ? 1 : 0.2 }}>⭐</span>)}
            </div>
          </div>
        );
      }
      return (
        <div style={{ position: "absolute", left: cx - NODE_R, top: cy - NODE_R, zIndex: 10 }}>
          <div className="node-locked" style={{ width: NODE_R * 2, height: NODE_R * 2 }}>
            <span style={{ fontSize: 14 }}>🔒</span>
            <span style={{ fontFamily: "'Baloo 2', sans-serif", color: "rgba(255,255,255,0.85)", fontWeight: 900, fontSize: 10 }}>{lvl}</span>
          </div>
        </div>
      );
    }

    function MapScreen({ highestCompleted, levelStars, onSelectLevel, gold }) {
      const scrollRef = useRef(null);
      const currentLevel = Math.min(highestCompleted + 1, TOTAL_LEVELS);
      const [soundOn, setSoundOn] = useState(soundEnabled);

      const positions = useMemo(() => Array.from({ length: TOTAL_LEVELS }, (_, i) => ({ x: nx(i), y: ny(i) })), []);
      const mapGradient = useMemo(() => buildMapGradient(), []);

      useEffect(() => {
        const nodeY = ny(currentLevel - 1);
        const target = Math.max(0, nodeY - 320);
        scrollRef.current?.scrollTo({ top: target, behavior: "auto" });
      }, []);

      const decor = useMemo(() => {
        const items = [];
        const count = Math.ceil(MAP_H / 190);
        for (let i = 0; i < count; i++) {
          items.push({
            key: i, top: i * 190 + 40,
            side: i % 2 === 0 ? "left" : "right",
            val: 8 + (i % 4) * 6,
            emoji: DECOR[i % DECOR.length]
          });
        }
        return items;
      }, []);

      const getStatus = (lvl) => lvl <= highestCompleted ? "completed" : lvl === currentLevel ? "current" : "locked";

      const toggleSound = () => { const next = !soundOn; setSoundOn(next); setSoundEnabled(next); };

      return (
        <div className="map-outer">
          <div className="map-header" style={{ background: "linear-gradient(135deg,#170B2E,#3B1E6E)" }}>
            <div className="flex items-center justify-between">
              <button className="icon-btn" onClick={toggleSound}>{soundOn ? "🔊" : "🔇"}</button>
              <div className="pill" style={{ color: "#E5484D" }}>❤️ <span>5</span></div>
              <div className="avatar-ring">🎲</div>
              <div className="pill" style={{ color: "#DB9B0A" }}>🥇 <span>{gold}</span></div>
              <button className="icon-btn">⚙️</button>
            </div>
            <div className="map-title">Ludo Rex Adventure</div>
          </div>

          <div className="map-scroll" ref={scrollRef}>
            <div style={{ position: "relative", width: MAP_W, height: MAP_H, margin: "0 auto", background: mapGradient }}>
              {decor.map(d => (
                <span key={d.key} style={{ position: "absolute", top: d.top, [d.side]: d.val, fontSize: 26, opacity: 0.45 }}>{d.emoji}</span>
              ))}

              {positions.map((p, i) => {
                if (i === 0) return null;
                const prev = positions[i - 1];
                const band = getBand(i);
                return <CandyPath key={i} x1={prev.x} y1={prev.y} x2={p.x} y2={p.y} color={band.accent} />;
              })}

              {positions.map((p, i) => {
                const lvl = i + 1;
                const band = getBand(i);
                const status = getStatus(lvl);
                return (
                  <LevelNode key={lvl} lvl={lvl} cx={p.x} cy={p.y} status={status}
                    stars={levelStars[lvl] || 0} accent={band.accent}
                    onPress={() => { if (status !== "locked") onSelectLevel(lvl); }} />
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function HomeScreen({ setScreen, setPlayers }) {
      const { t } = useTranslation();
      const [mode, setMode] = useState("1bot");
      const modeInfo = MODES.find(m => m.id === mode);
      const maxPlayers = modeInfo.players;
      const [humanColor, setHumanColor] = useState("red");
      const ALL_COLORS = ["red", "green", "yellow", "blue"];

      const handleStart = () => {
        const players = [];
        players.push({
          color: humanColor,
          isBot: false,
          difficulty: null,
          name: "You"
        });
        const remaining = ALL_COLORS.filter(c => c !== humanColor);
        for (let i = 0; i < maxPlayers - 1; i++) {
          players.push({
            color: remaining[i],
            isBot: true,
            difficulty: BOT_LEVELS.WARM_UP,
            name: `Bot ${i + 1}`
          });
        }
        setPlayers(players);
        setScreen("map");
      };

      return (
        <div className="home flex flex-col items-center justify-center min-h-screen px-5 py-8">
          <div className="text-center mb-6">
            <div className="flex justify-center gap-2 mb-2">
              {["red", "yellow", "green", "blue"].map(c => (
                <span key={c} className="inline-block w-3 h-3 rounded-full" style={{ background: COLOR_HEX[c].main }} />
              ))}
            </div>
            <h1 className="text-4xl md:text-5xl font-extrabold" style={{
              fontFamily: "'Baloo 2', sans-serif",
              backgroundImage: "linear-gradient(90deg, var(--ludo-red), var(--ludo-yellow), var(--ludo-green), var(--ludo-blue))",
              WebkitBackgroundClip: "text",
              backgroundClip: "text",
              color: "transparent"
            }}>
              Ludo Rex
            </h1>
            <p className="text-sm md:text-base text-indigo-200/80 mt-2 font-medium tracking-wide">
              Tap • Roll • Win!
            </p>
          </div>

          <div className="w-full max-w-sm rounded-3xl p-5" style={{
            background: "rgba(255,255,255,0.06)",
            border: "1px solid rgba(255,255,255,0.10)",
            boxShadow: "var(--shadow-glow)",
            backdropFilter: "blur(6px)"
          }}>
            <h3 className="text-[var(--ludo-yellow)] font-extrabold text-lg mb-1" style={{ fontFamily: "'Baloo 2', sans-serif" }}>Choose a mode</h3>
            <p className="text-white/60 text-xs mb-3">Pick how many are playing.</p>
            <div className="grid grid-cols-3 gap-2.5 mb-6">
              {MODES.map(m => (
                <button
                  key={m.id}
                  className={"mode-card flex flex-col items-center justify-center gap-1 rounded-2xl border-2 py-3 px-2 transition " +
                    (mode === m.id
                      ? "bg-white/95 border-[var(--ludo-yellow)] text-[#2B2620] shadow-lg"
                      : "bg-white/5 border-white/10 text-white hover:bg-white/10")
                  }
                  onClick={() => setMode(m.id)}
                >
                  <div className="flex gap-1 mb-0.5">
                    {["red", "yellow", "green", "blue"].slice(0, m.dots).map((c, i) => (
                      <span key={i} className="w-2.5 h-2.5 rounded-full" style={{ background: COLOR_HEX[c].main }} />
                    ))}
                  </div>
                  <span className="font-bold text-sm" style={{ fontFamily: "'Baloo 2', sans-serif" }}>{m.label}</span>
                  <span className="text-[10px] opacity-70">{m.sub}</span>
                </button>
              ))}
            </div>

            <h3 className="text-[var(--ludo-yellow)] font-extrabold text-lg mb-1" style={{ fontFamily: "'Baloo 2', sans-serif" }}>Your color</h3>
            <p className="text-white/60 text-xs mb-3">
              Choose your token color. Remaining players will be controlled by bots.
            </p>
            <div className="flex justify-center gap-3 mb-6">
              {["red", "green", "yellow", "blue"].map(c => (
                <button
                  key={c}
                  onClick={() => setHumanColor(c)}
                  className={
                    "color-dot-btn w-12 h-12 rounded-full flex items-center justify-center border-4 transition " +
                    (humanColor === c
                      ? "border-white scale-110 shadow-lg"
                      : "border-transparent")
                  }
                  style={{ background: COLOR_HEX[c].soft }}
                >
                  <ColorGlyph color={c} />
                </button>
              ))}
            </div>

            <button
              className="w-full font-extrabold text-lg py-3.5 rounded-2xl transition active:scale-[0.98]"
              style={{
                fontFamily: "'Baloo 2', sans-serif",
                background: "linear-gradient(180deg, var(--ludo-yellow), var(--ludo-yellow-dark))",
                color: "#3a2600",
                boxShadow: "0 5px 0 #9c6c10, 0 10px 24px rgba(0,0,0,0.35)"
              }}
              onClick={handleStart}
            >
              Start Game
            </button>

            <p className="text-white/50 text-[11px] mt-4 leading-relaxed">Roll a 6 to bring a token out of base. Land on a rival to send it home — unless they're on a star or start square. Get all 4 tokens to the center to win.</p>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [players, setPlayers] = useState(null);

      const [activeLevel, setActiveLevel] = useState(1);
      const [highestCompleted, setHighestCompleted] = useState(0);
      const [levelStars, setLevelStars] = useState({});
      const [gold, setGold] = useState(120);

      // Derive the current bot roster's difficulty from the active level,
      // so bots get progressively tougher as the player advances the map.
      const gamePlayers = useMemo(() => {
        if (!players) return players;
        const difficulty = difficultyForLevel(activeLevel);
        return players.map(p => p.isBot ? { ...p, difficulty } : p);
      }, [players, activeLevel]);

      const startLevel = (lvl) => {
        setActiveLevel(Math.min(lvl, TOTAL_LEVELS));
        setScreen("game");
      };

      const handleLevelWon = (lvl) => {
        setHighestCompleted(prev => Math.max(prev, lvl));
        setLevelStars(prev => ({ ...prev, [lvl]: prev[lvl] || (2 + Math.round(Math.random())) }));
        setGold(prev => prev + 20);
      };

      return (
        <div className="app">
          {screen === "home" && (
            <HomeScreen
              setScreen={setScreen}
              setPlayers={setPlayers}
            />
          )}
          {screen === "map" && (
            <MapScreen
              highestCompleted={highestCompleted}
              levelStars={levelStars}
              gold={gold}
              onSelectLevel={startLevel}
            />
          )}
          {screen === "game" && gamePlayers && (
            <GameScreen setScreen={setScreen} players={gamePlayers} level={activeLevel} />
          )}
        </div>
      )
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
